{{ define "main" }}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  /* ── Kill Apero grid + single-page chrome ─────── */
  .grid-container,
  .grid-container.single { display: block !important; }

  /* Hide Apero's auto-generated post metadata */
  .post-meta,
  .post-footer,
  .article-content > dl,
  .article-content > p:last-child,
  .see-also { display: none !important; }

  /* ── Variables ───────────────────────────────── */
  :root {
    --accent:        #0ea5e9;
    --accent-teal:   #0284c7;
    --accent-soft:   rgba(14,165,233,0.08);
    --accent-glow:   rgba(14,165,233,0.16);
    --accent-border: rgba(14,165,233,0.22);
    --ff-display:    'DM Sans', sans-serif;
    --ff-body:       'DM Sans', sans-serif;
    --radius:        14px;
  }

  /* ── Page shell ──────────────────────────────── */
  .cv-page {
    font-family: var(--ff-body);
    max-width: 820px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
  }

  /* ── Page header ─────────────────────────────── */
  .cv-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1.2rem;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid rgba(128,128,128,0.12);
  }

  .cv-header-text {}

  .cv-page-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid var(--accent-border);
    border-radius: 100px;
    padding: 3px 11px;
    margin-bottom: 0.7rem;
  }

  .cv-page-title {
    font-family: var(--ff-display);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 400;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin: 0 0 0.3rem;
  }

  .cv-page-title em {
    font-style: italic;
    background: linear-gradient(135deg, #0ea5e9, #38bdf8, #0284c7);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: title-grad 6s ease infinite;
  }

  @keyframes title-grad {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  .cv-page-sub {
    font-size: 0.85rem;
    color: #94a3b8;
    font-weight: 300;
    margin: 0;
  }

  /* Download button */
  .cv-download {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.65rem 1.4rem;
    border-radius: 10px;
    border: 1.5px solid var(--accent-border);
    font-family: var(--ff-body);
    font-size: 0.82rem;
    font-weight: 500;
    text-decoration: none;
    color: var(--accent);
    background: var(--accent-soft);
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s, transform 0.2s, color 0.2s;
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 0.25rem;
  }
  .cv-download:hover {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 18px var(--accent-glow);
    transform: translateY(-1px);
    text-decoration: none;
  }

  /* ── Section ─────────────────────────────────── */
  .cv-section {
    margin-bottom: 3rem;
  }

  .cv-section-title {
    font-family: var(--ff-display);
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin: 0 0 1.2rem;
    padding-bottom: 0.6rem;
    border-bottom: 1.5px solid;
    border-image: linear-gradient(
      90deg,
      var(--accent) 0%,
      var(--accent-teal) 45%,
      transparent 100%) 1;
  }

  /* ── Card ────────────────────────────────────── */
  .cv-card {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1.2rem 1.4rem 1.2rem 1.5rem;
    border: 1px solid rgba(128,128,128,0.13);
    border-radius: var(--radius);
    margin-bottom: 0.75rem;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.22s, border-color 0.22s, transform 0.22s;
    animation: fadeUp 0.4s ease both;
  }

  /* Left accent bar */
  .cv-card::before {
    content: '';
    position: absolute;
    left: 0; top: 18px; bottom: 18px;
    width: 3px;
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent-teal) 100%);
    border-radius: 0 2px 2px 0;
    opacity: 0.3;
    transition: opacity 0.22s, top 0.22s, bottom 0.22s;
  }

  .cv-card:hover {
    box-shadow: 0 4px 24px var(--accent-glow);
    border-color: var(--accent-border);
    transform: translateY(-2px);
  }
  .cv-card:hover::before { opacity: 0.9; top: 0; bottom: 0; }

  /* Logo */
  .cv-logo-wrap {
    flex-shrink: 0;
    width: 46px;
    height: 46px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(128,128,128,0.12);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }

  .cv-logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 4px;
  }

  .cv-logo-placeholder {
    font-size: 1.1rem;
    color: var(--accent);
    background: var(--accent-soft);
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
  }

  /* Card body */
  .cv-card-body {
    flex: 1;
    min-width: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .cv-card-info { flex: 1; min-width: 0; }

  .cv-role {
    font-family: var(--ff-display);
    font-size: 1.08rem;
    font-weight: 400;
    line-height: 1.3;
    margin-bottom: 0.18rem;
  }

  .cv-org {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--accent-teal);
    margin-bottom: 0.18rem;
  }

  .cv-loc {
    font-size: 0.75rem;
    color: #94a3b8;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .cv-loc i { font-size: 0.65rem; color: var(--accent); opacity: 0.7; }

  .cv-desc {
    font-size: 0.82rem;
    line-height: 1.65;
    color: #64748b;
    margin: 0;
  }

  /* Date badge */
  .cv-date {
    flex-shrink: 0;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid var(--accent-border);
    border-radius: 100px;
    padding: 0.2rem 0.75rem;
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 0.1rem;
  }

  /* Education: vertically centred */
  .cv-card--edu .cv-card-body { align-items: center; }
  .cv-card--edu .cv-loc       { margin-bottom: 0; }

  /* Loading state */
  .cv-loading {
    text-align: center;
    padding: 2rem;
    font-size: 0.85rem;
    color: #94a3b8;
  }

  /* Staggered animation */
  .cv-card:nth-child(1)  { animation-delay: 0.04s; }
  .cv-card:nth-child(2)  { animation-delay: 0.08s; }
  .cv-card:nth-child(3)  { animation-delay: 0.12s; }
  .cv-card:nth-child(4)  { animation-delay: 0.16s; }
  .cv-card:nth-child(5)  { animation-delay: 0.20s; }
  .cv-card:nth-child(6)  { animation-delay: 0.24s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ──────────────────────────────── */
  @media (max-width: 560px) {
    .cv-page { padding: 2rem 1rem 5rem; }
    .cv-header { flex-direction: column; gap: 1rem; }
    .cv-card { padding: 1rem 1.1rem 1rem 1.3rem; }
    .cv-card-body { flex-direction: column; gap: 0.4rem; }
    .cv-date { align-self: flex-start; }
    .cv-logo-wrap { width: 38px; height: 38px; }
  }
</style>

<div class="cv-page">

  <!-- Header -->
  <div class="cv-header">
    <div class="cv-header-text">
      <div class="cv-page-eyebrow">
        <i class="fa-regular fa-id-card" style="font-size:.6rem;"></i>
        Curriculum Vitae
      </div>
    </div>
    <button class="cv-download" onclick="window.open('resume.pdf','_blank')">
      <i class="fa-solid fa-file-arrow-down"></i> Download PDF
    </button>
  </div>

  <!-- Work Experience -->
  <div class="cv-section">
    <h2 class="cv-section-title">Work Experience</h2>
    <div id="cv-experience"><div class="cv-loading"><i class="fa-solid fa-circle-notch fa-spin"></i>&nbsp; Loading…</div></div>
  </div>

  <!-- Education -->
  <div class="cv-section">
    <h2 class="cv-section-title">Education</h2>
    <div id="cv-education"><div class="cv-loading"><i class="fa-solid fa-circle-notch fa-spin"></i>&nbsp; Loading…</div></div>
  </div>

</div>

<script>
(function () {
  function logoHtml(item) {
    if (item.logo) {
      return '<div class="cv-logo-wrap">' +
        '<img src="' + item.logo + '" alt="' + item.org + '" ' +
        'onerror="this.parentNode.innerHTML=\'<div class=&quot;cv-logo-placeholder&quot;><i class=&quot;fa-solid fa-building&quot;></i></div>\'">' +
        '</div>';
    }
    return '<div class="cv-logo-wrap"><div class="cv-logo-placeholder"><i class="fa-solid fa-building"></i></div></div>';
  }

  function buildCard(item, isEdu) {
    var desc = (!isEdu && item.desc)
      ? '<p class="cv-desc">' + item.desc + '</p>' : '';

    return '<div class="cv-card' + (isEdu ? ' cv-card--edu' : '') + '">' +
      logoHtml(item) +
      '<div class="cv-card-body">' +
        '<div class="cv-card-info">' +
          '<div class="cv-role">'  + item.role     + '</div>' +
          '<div class="cv-org">'   + item.org      + '</div>' +
          '<div class="cv-loc"><i class="fa-solid fa-location-dot"></i>' + item.location + '</div>' +
          desc +
        '</div>' +
        '<div class="cv-date">' + item.date + '</div>' +
      '</div>' +
    '</div>';
  }
  fetch('cv.json')
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function (data) {
      document.getElementById('cv-experience').innerHTML =
        data.experience.map(function (i) { return buildCard(i, false); }).join('');
      document.getElementById('cv-education').innerHTML =
        data.education.map(function (i) { return buildCard(i, true); }).join('');
    })
    .catch(function (err) {
      var msg = '<div class="cv-loading">⚠ Could not load CV data — ' + err.message + '</div>';
      document.getElementById('cv-experience').innerHTML = msg;
      document.getElementById('cv-education').innerHTML  = msg;
    });
})();
</script>

{{ end }}
