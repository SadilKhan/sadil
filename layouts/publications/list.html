<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  /* ── Fix Apero grid ───────────────────────────── */
  html,
  body {
    background: var(--pub-page-bg, #f6f8fb) !important;
  }

  .dark-mode {
    --pub-page-bg: #080b12;
  }

  .grid-container.list,
  .grid-container,
  .page-main {
    display: block !important;
    width: 100% !important;
    max-width: none !important;
    margin: 0 !important;
  }

  .page-main { padding: 0 !important; }

  /* ── Hero shell ───────────────────────────────── */
  .pub-hero {
    position: relative;
    width: 100%;
    height: 410px;
    overflow: hidden;
    background: #04091a;
  }

  #hero-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Vignette + centre spotlight */
  .pub-hero-vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 55% at 50% 52%,
        rgba(4,9,26,0.0) 0%,
        rgba(4,9,26,0.55) 100%),
      linear-gradient(to bottom,
        rgba(4,9,26,0.15) 0%,
        rgba(4,9,26,0.0) 40%,
        rgba(4,9,26,0.5) 100%);
    pointer-events: none;
  }

  .pub-hero::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 150px;
    pointer-events: none;
    background: linear-gradient(
      to bottom,
      rgba(4,9,26,0) 0%,
      rgba(4,9,26,0.44) 48%,
      var(--pub-page-bg, #f6f8fb) 100%
    );
    z-index: 2;
  }

  .dark-mode .pub-hero::after {
    background: linear-gradient(
      to bottom,
      rgba(4,9,26,0) 0%,
      rgba(4,9,26,0.55) 48%,
      #080b12 100%
    );
  }

  /* ── Hero text ────────────────────────────────── */
  .pub-hero-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 1.5rem;
    pointer-events: none;
    z-index: 3;
  }

  .pub-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Geist', sans-serif;
    font-size: 0.58rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(147,197,253,0.8);
    border: 1px solid rgba(147,197,253,0.18);
    border-radius: 100px;
    padding: 4px 14px;
    margin-bottom: 1.2rem;
    backdrop-filter: blur(4px);
    background: rgba(4,9,26,0.3);
  }

  .pub-hero-title {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: clamp(2.8rem, 6.5vw, 5rem);
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -0.03em;
    margin: 0 0 0.6rem;
    background: linear-gradient(135deg,
      #bfdbfe 0%,
      #93c5fd 20%,
      #ffffff 48%,
      #a5f3fc 72%,
      #818cf8 100%);
    background-size: 260% 260%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: title-grad 8s ease infinite;
  }

  @keyframes title-grad {
    0%   { background-position: 0%   50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0%   50%; }
  }

  .pub-hero-title em { font-style: italic; }

  .pub-tagline {
    font-family: 'Geist', sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    color: rgba(148,163,184,0.7);
    letter-spacing: 0.08em;
    margin: 0;
  }

  /* ── Search ───────────────────────────────────── */
  .pub-search-zone {
    width: min(1360px, calc(100% - 72px));
    max-width: none;
    margin: -28px auto 0;
    padding: 0 1.5rem;
    position: relative;
    z-index: 10;
  }

  .pub-search-wrap {
    position: relative;
    border-radius: 16px;
    background: rgba(255,255,255,0.96);
    border: 1px solid rgba(37,99,235,0.14);
    box-shadow: 0 8px 32px rgba(0,0,0,0.16), 0 2px 8px rgba(0,0,0,0.08);
    transition: box-shadow 0.3s, border-color 0.3s;
  }
  .pub-search-wrap:focus-within {
    border-color: rgba(37,99,235,0.45);
    box-shadow: 0 8px 32px rgba(37,99,235,0.14), 0 0 0 3px rgba(37,99,235,0.07);
  }

  .pub-search-icon {
    position: absolute;
    left: 1.1rem; top: 50%;
    transform: translateY(-50%);
    color: #94a3b8; font-size: 0.85rem;
    pointer-events: none; z-index: 2;
    transition: color 0.25s;
  }
  .pub-search-wrap:focus-within .pub-search-icon { color: #2563eb; }

  #search {
    width: 100% !important;
    padding: 1.05rem 4rem 1.05rem 2.75rem !important;
    border: none !important; border-radius: 16px !important;
    background: transparent !important;
    font-family: 'Geist', sans-serif !important;
    font-size: 0.9rem !important; color: #1e293b !important;
    outline: none !important; box-shadow: none !important;
  }
  #search::placeholder { color: #94a3b8 !important; font-style: normal !important; font-size: 0.9rem !important; }

  /* ── Typing dots ──────────────────────────────── */
  .pub-typing {
    position: absolute; right: 1.1rem; top: 50%;
    transform: translateY(-50%);
    display: flex; align-items: center; gap: 4px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .pub-typing.active { opacity: 1; }
  .pub-typing span {
    width: 6px; height: 6px; border-radius: 50%; background: #2563eb;
    animation: dot-b 1.1s ease-in-out infinite;
  }
  .pub-typing span:nth-child(2) { animation-delay: .16s; }
  .pub-typing span:nth-child(3) { animation-delay: .32s; }
  @keyframes dot-b {
    0%,80%,100% { transform: translateY(0); opacity: .3; }
    40%         { transform: translateY(-6px); opacity: 1; }
  }

  /* ── Below search ─────────────────────────────── */
  .pub-controls {
    width: min(1360px, calc(100% - 72px));
    margin: 18px auto 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    font-family: 'Geist', sans-serif;
  }

  .pub-filter-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    width: 100%;
  }

  .pub-filter {
    border: 1px solid rgba(15,23,42,0.10);
    border-radius: 999px;
    min-height: 32px;
    padding: 0 13px;
    background: rgba(255,255,255,0.78);
    color: #475569;
    font: 700 0.76rem 'Geist', sans-serif;
    cursor: pointer;
    transition: transform 180ms, color 180ms, background 180ms, border-color 180ms, box-shadow 180ms;
  }

  .pub-filter:hover,
  .pub-filter.is-active {
    color: #0f172a;
    background: #ffffff;
    border-color: rgba(37,99,235,0.28);
    box-shadow: 0 8px 24px rgba(37,99,235,0.10);
    transform: translateY(-1px);
  }

  .dark-mode .pub-filter {
    color: #a8b0cc;
    border-color: rgba(226,232,240,0.10);
    background: rgba(20,25,38,0.82);
  }

  .dark-mode .pub-filter:hover,
  .dark-mode .pub-filter.is-active {
    color: #e6e9f4;
    background: rgba(31,38,55,0.92);
    border-color: rgba(91,156,246,0.38);
  }

  .pub-rule {
    max-width: 1360px; margin: 1.25rem auto 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(37,99,235,0.2) 30%, rgba(99,102,241,0.2) 70%, transparent);
  }

  .pub-cards {
    max-width: 1360px; margin: 0 auto;
    padding: 1.6rem 1.5rem 5rem;
  }

  @media (max-width: 760px) {
    .pub-hero { height: 340px; }
    .pub-search-zone,
    .pub-controls { width: calc(100% - 32px); padding: 0; }
    .pub-controls { display: block; }
    .pub-cards { padding: 1.5rem 1rem 4rem; }
  }
</style>

<!-- ════════════════════════════════════════════════
     HERO CANVAS — Neural Net + CAD/3D overlays
════════════════════════════════════════════════ -->
<script>
(function () {
  var canvas = document.getElementById('hero-canvas');
  var ctx    = canvas.getContext('2d');
  var W, H, nodes = [], frame = 0, animId;

  /* ── Palette (always dark bg) ─── */
  var COL = {
    baseEdge:   'rgba(108,140,255,',
    activeEdge: 'rgba(167,139,250,',
    nodeBase:   [108, 140, 255],
    nodeActive: [167, 139, 250],
    glowActive: [52,  211, 153],   /* emerald — "fired" neuron */
    signal:     [99,  230, 250],   /* cyan signal dots */
    cad:        [251, 191,  36],   /* amber — CAD wireframe */
    cadDim:     [251, 191,  36],
    grid:       [30,  58,  138],   /* deep-blue grid */
  };

  /* ── Layer config (BrepDreamer original) ─── */
  var LAYERS = [3, 5, 7, 7, 5, 3];
  var LABELS = ['Input','Hidden','Hidden','Hidden','Hidden','Output'];

  /* ── Resize ─── */
  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    buildNodes();
    buildGrid();
  }

  /* ════════════════════════════
     1. NEURAL NETWORK NODES
  ════════════════════════════ */
  function buildNodes() {
    nodes = [];
    var spacingX = W / (LAYERS.length + 1);
    LAYERS.forEach(function (count, li) {
      var x     = spacingX * (li + 1);
      var span  = (count - 1) * (H / 10);
      var start = H / 2 - span / 2;
      for (var ni = 0; ni < count; ni++) {
        var y = count === 1 ? H / 2 : start + ni * (span / (count - 1));
        nodes.push({
          x: x, y: y, layer: li, idx: ni,
          r: 5 + Math.random() * 3,
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: 0.018 + Math.random() * 0.012,
          active: Math.random() > 0.4,
          activationTimer:    Math.random() * 120,
          activationDuration: 40 + Math.random() * 60,
        });
      }
    });
  }

  function layerNodes(li) {
    return nodes.filter(function (n) { return n.layer === li; });
  }

  /* ════════════════════════════
     2. PARAMETRIC SURFACE GRID
     A gently rippling u-v grid — represents NURBS/Bézier surfaces
  ════════════════════════════ */
  var GRID_W = 14, GRID_H = 8;
  var gridPts = [];

  function buildGrid() {
    gridPts = [];
    var marginX = W * 0.05, marginY = H * 0.1;
    for (var j = 0; j <= GRID_H; j++) {
      var row = [];
      for (var i = 0; i <= GRID_W; i++) {
        row.push({
          bx: marginX + i * (W - marginX * 2) / GRID_W,
          by: marginY + j * (H - marginY * 2) / GRID_H,
          phase: i * 0.4 + j * 0.55,
        });
      }
      gridPts.push(row);
    }
  }

  function drawGrid(t) {
    ctx.lineWidth   = 0.4;
    ctx.strokeStyle = 'rgba(30,58,138,0.22)';

    /* Horizontal lines */
    for (var j = 0; j <= GRID_H; j++) {
      ctx.beginPath();
      for (var i = 0; i <= GRID_W; i++) {
        var p = gridPts[j][i];
        var dy = Math.sin(t * 0.6 + p.phase) * 7;
        var x  = p.bx, y = p.by + dy;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    /* Vertical lines */
    for (var i = 0; i <= GRID_W; i++) {
      ctx.beginPath();
      for (var j = 0; j <= GRID_H; j++) {
        var p = gridPts[j][i];
        var dy = Math.sin(t * 0.6 + p.phase) * 7;
        var x  = p.bx, y = p.by + dy;
        j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }

  /* ════════════════════════════
     3. FLOATING DATA TOKENS
     Small labelled chips drifting up — "text → CAD", "point → mesh" etc.
  ════════════════════════════ */
  var TOKENS = [];
  var TOKEN_LABELS = ['text→CAD','point→mesh','img→3D','NURBS','B-Rep','∇loss','σ=0.8','latent z','mesh','voxel'];

  function spawnToken() {
    TOKENS.push({
      x:     W * 0.15 + Math.random() * W * 0.7,
      y:     H + 20,
      label: TOKEN_LABELS[Math.floor(Math.random() * TOKEN_LABELS.length)],
      speed: 0.25 + Math.random() * 0.35,
      alpha: 0,
      life:  0,
      maxLife: 220 + Math.random() * 120,
    });
  }

  function drawTokens() {
    /* Spawn rate */
    if (frame % 55 === 0) spawnToken();

    TOKENS = TOKENS.filter(function (tk) { return tk.life < tk.maxLife; });
    TOKENS.forEach(function (tk) {
      tk.life++;
      tk.y -= tk.speed;
      /* Fade in / fade out */
      var prog = tk.life / tk.maxLife;
      tk.alpha = prog < 0.15 ? prog / 0.15
               : prog > 0.75 ? (1 - prog) / 0.25
               : 1.0;
      tk.alpha *= 0.55;

      var pad = 6, fSize = 9;
      ctx.font = '500 ' + fSize + 'px "DM Mono", monospace';
      var tw   = ctx.measureText(tk.label).width;
      var bw   = tw + pad * 2, bh = fSize + pad * 2;

      ctx.save();
      ctx.globalAlpha = tk.alpha;
      /* Pill background */
      ctx.fillStyle = 'rgba(14,30,64,0.85)';
      ctx.beginPath();
      roundRect(ctx, tk.x - bw / 2, tk.y - bh / 2, bw, bh, 4);
      ctx.fill();
      /* Pill border */
      ctx.strokeStyle = 'rgba(99,179,237,0.5)';
      ctx.lineWidth   = 0.6;
      ctx.stroke();
      /* Label */
      ctx.fillStyle   = 'rgba(186,230,253,0.95)';
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(tk.label, tk.x, tk.y);
      ctx.restore();
    });
  }

  function roundRect(c, x, y, w, h, r) {
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r);
    c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h);
    c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y, x + r, y);
  }

  /* ════════════════════════════
     4. SCAN LINES (subtle CRT / data scan feel)
  ════════════════════════════ */
  var scanY = 0;
  function drawScan(t) {
    scanY = (scanY + 0.8) % H;
    var grad = ctx.createLinearGradient(0, scanY - 60, 0, scanY + 60);
    grad.addColorStop(0,   'rgba(99,179,237,0)');
    grad.addColorStop(0.5, 'rgba(99,179,237,0.04)');
    grad.addColorStop(1,   'rgba(99,179,237,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, scanY - 60, W, 120);
  }

  /* ════════════════════════════
     MAIN DRAW LOOP
  ════════════════════════════ */
  function draw() {
    var t = frame * 0.016;
    ctx.clearRect(0, 0, W, H);
    frame++;

    /* ── Layer 0: parametric surface grid (deepest) ── */
    if (frame % 2 === 0) drawGrid(t);

    /* ── Layer 1: scan line ── */
    drawScan(t);

    /* ── Layer 3: Neural network ── */
    /* Update activations */
    nodes.forEach(function (n) {
      n.activationTimer++;
      if (n.activationTimer > n.activationDuration) {
        n.active = Math.random() > 0.35;
        n.activationTimer = 0;
        n.activationDuration = 50 + Math.random() * 80;
      }
      n.pulse += n.pulseSpeed;
    });

    /* Edges */
    for (var li = 0; li < LAYERS.length - 1; li++) {
      var from = layerNodes(li);
      var to   = layerNodes(li + 1);
      from.forEach(function (a) {
        to.forEach(function (b) {
          var both  = a.active && b.active;
          var prog  = Math.sin(frame * 0.025 + a.pulse) * 0.5 + 0.5;
          var alpha = both
            ? 0.22 + prog * 0.18
            : 0.05 + prog * 0.04;

          var mx = (a.x + b.x) / 2;
          var my = (a.y + b.y) / 2 + Math.sin(a.pulse) * 18;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.quadraticCurveTo(mx, my, b.x, b.y);

          if (both) {
            ctx.strokeStyle = COL.activeEdge + alpha + ')';
            ctx.lineWidth   = 0.9;
          } else {
            ctx.strokeStyle = COL.baseEdge + alpha + ')';
            ctx.lineWidth   = 0.5;
          }
          ctx.stroke();

          /* Travelling signal dot */
          if (both && Math.sin(frame * 0.018 + a.idx) > 0.7) {
            var tt  = (frame * 0.005 + a.pulse * 0.3) % 1;
            var mt  = 1 - tt;
            var sx  = mt * mt * a.x + 2 * mt * tt * mx + tt * tt * b.x;
            var sy  = mt * mt * a.y + 2 * mt * tt * my + tt * tt * b.y;
            ctx.beginPath();
            ctx.arc(sx, sy, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(52,211,153,0.88)';
            ctx.fill();
          }
        });
      });
    }

    /* Nodes */
    nodes.forEach(function (n) {
      var pulsed = n.r + Math.sin(n.pulse) * 1.2;
      var col    = n.active ? COL.nodeActive : COL.nodeBase;
      var nr = col[0], ng = col[1], nb = col[2];
      var alpha  = n.active ? 0.95 : 0.35;

      /* Glow halo */
      if (n.active) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, pulsed * 4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(52,211,153,0.08)';
        ctx.fill();
      }

      /* Outer ring */
      ctx.beginPath();
      ctx.arc(n.x, n.y, pulsed + 2.5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(' + nr + ',' + ng + ',' + nb + ',' + (alpha * 0.4) + ')';
      ctx.lineWidth = 1;
      ctx.stroke();

      /* Node fill */
      ctx.beginPath();
      ctx.arc(n.x, n.y, pulsed, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + nr + ',' + ng + ',' + nb + ',' + alpha + ')';
      ctx.fill();
    });

    /* Layer labels */
    var spacingX = W / (LAYERS.length + 1);
    ctx.font      = '500 11px "DM Mono", monospace';
    ctx.textAlign = 'center';
    LAYERS.forEach(function (_, li) {
      var lnodes = layerNodes(li);
      var topY   = Math.min.apply(null, lnodes.map(function (n) { return n.y; }));
      ctx.fillStyle = 'rgba(250,160,100,1.0)';
      ctx.fillText(LABELS[li] || 'Hidden', spacingX * (li + 1), topY - 18);
    });

    /* ── Layer 4: floating data tokens ── */
    drawTokens();

    animId = setTimeout(function() {
  requestAnimationFrame(draw);
}, 1000 / 30);
  }

  /* ── Boot ── */
  resize();
  draw();
  window.addEventListener('resize', function () {
    clearTimeout(animId);
    resize();
    draw();
  });
})();
</script>

<!-- ── Typing dots ──────────────────────────────── -->
<script>
(function () {
  var inp   = document.getElementById('search');
  var dots  = document.getElementById('pub-typing');
  var timer = null;
  if (!inp || !dots) return;
  inp.addEventListener('input', function () {
    if (inp.value.length > 0) {
      dots.classList.add('active');
      clearTimeout(timer);
      timer = setTimeout(function () { dots.classList.remove('active'); }, 600);
    } else {
      clearTimeout(timer);
      dots.classList.remove('active');
    }
  });
})();
</script>
