<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PPO — clipped probability ratio">
  <style>
    .bg { fill: #0a0c10; }
    .grid { stroke: rgba(138, 180, 248, 0.08); stroke-width: 1; }
    .ax { stroke: rgba(138, 180, 248, 0.32); stroke-width: 1.2; }
    .ax-label { font: 700 11px 'Plus Jakarta Sans', sans-serif; fill: rgba(138, 180, 248, 0.78); letter-spacing: 0.10em; }
    .band { fill: rgba(52, 168, 83, 0.10); stroke: rgba(52, 168, 83, 0.42); stroke-width: 1; stroke-dasharray: 3 4; }
    .band-label { font: 700 10px 'JetBrains Mono', monospace; fill: rgba(52, 168, 83, 0.85); letter-spacing: 0.05em; }
    .center-line { stroke: rgba(255,255,255,0.18); stroke-width: 1; stroke-dasharray: 2 4; }
    .ratio { stroke: #8ab4f8; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 6px rgba(138, 180, 248, 0.45)); }
    .clipped { stroke: #ea4335; stroke-width: 2.4; fill: none; stroke-linecap: round; }
    .head { fill: #8ab4f8; }
    .ε-mark { fill: rgba(52, 168, 83, 0.85); }
    .title { font: 800 13px 'Plus Jakarta Sans', sans-serif; fill: #e8eaed; letter-spacing: 0.04em; }
    .sub  { font: 600 10px 'JetBrains Mono', monospace; fill: rgba(138, 180, 248, 0.60); letter-spacing: 0.10em; text-transform: uppercase; }

    @keyframes ppo-wave {
      0%, 100% { transform: translateX(0); }
      50%      { transform: translateX(-200px); }
    }
    @keyframes ppo-clip-pulse {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }
    @keyframes ppo-bead {
      0%   { offset-distance: 0%; }
      100% { offset-distance: 100%; }
    }
    .wave-g    { animation: ppo-wave 6s linear infinite; will-change: transform; }
    .clip-mark { animation: ppo-clip-pulse 1.8s ease-in-out infinite; transform-origin: center; }
    .bead {
      offset-path: path('M 80 220 C 160 100, 220 320, 300 150 S 460 280, 540 180');
      offset-rotate: 0deg;
      animation: ppo-bead 4.5s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .wave-g, .clip-mark, .bead { animation: none; }
    }
  </style>

  <rect class="bg" width="600" height="400"/>

  <!-- subtle grid -->
  <g class="grid">
    <line x1="60"  y1="60"  x2="60"  y2="340"/>
    <line x1="160" y1="60"  x2="160" y2="340"/>
    <line x1="260" y1="60"  x2="260" y2="340"/>
    <line x1="360" y1="60"  x2="360" y2="340"/>
    <line x1="460" y1="60"  x2="460" y2="340"/>
    <line x1="560" y1="60"  x2="560" y2="340"/>
    <line x1="40"  y1="100" x2="580" y2="100"/>
    <line x1="40"  y1="200" x2="580" y2="200"/>
    <line x1="40"  y1="300" x2="580" y2="300"/>
  </g>

  <!-- header -->
  <text class="sub"   x="40" y="38">PPO · clipped surrogate</text>
  <text class="title" x="40" y="58">L = min( rₜ · A,  clip(rₜ, 1−ε, 1+ε) · A )</text>

  <!-- clipping band (1-ε, 1+ε) — the safe corridor -->
  <rect class="band" x="50" y="160" width="510" height="80" rx="3"/>
  <text class="band-label" x="56" y="155">1 + ε</text>
  <text class="band-label" x="56" y="252">1 − ε</text>

  <!-- center reference line r = 1 -->
  <line class="center-line" x1="50" y1="200" x2="560" y2="200"/>

  <!-- ratio curve — drifts horizontally, oscillates above/below band -->
  <g class="wave-g">
    <path class="ratio" d="
      M -200 200
      C -160 130, -120 280, -60  200
      S 40 100, 100 200
      S 220 270, 280 200
      S 380 130, 440 200
      S 540 280, 600 200
      S 700 100, 760 200
      S 880 270, 940 200" />
  </g>

  <!-- bead — small marker traveling along a smooth fixed path -->
  <circle class="bead head" r="5"/>

  <!-- clip indicators at top and bottom edges of band -->
  <g class="clip-mark">
    <line class="clipped" x1="150" y1="160" x2="190" y2="160"/>
    <line class="clipped" x1="350" y1="160" x2="390" y2="160"/>
    <line class="clipped" x1="150" y1="240" x2="190" y2="240"/>
    <line class="clipped" x1="350" y1="240" x2="390" y2="240"/>
  </g>

  <!-- axis labels -->
  <line class="ax" x1="40" y1="60" x2="40" y2="340"/>
  <text class="ax-label" x="22" y="68">r</text>
  <line class="ax" x1="40" y1="340" x2="580" y2="340"/>
  <text class="ax-label" x="556" y="358">step</text>
</svg>
