<style>
   
  .js-toggle-wrapper {
    display: table;
    margin: 4px auto 0;
    z-index: 10000;
    position: relative;
  }

  .js-toggle {
    position: relative;
    display: inline-block;
    width: 76px;
    height: 30px;
    cursor: pointer;
    user-select: none;
    border-radius: 18px;
    background: transparent;
    border: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    transition: filter 240ms ease;
     
    --eye-dx: 0px;
    --eye-dy: 0px;
     
    --px: 0;
    --py: 0;
  }
  .js-toggle:hover { filter: brightness(1.06); }
  .js-toggle:focus-visible { outline: 2px solid rgba(14, 165, 233, 0.55); outline-offset: 3px; }

  .js-toggle-screenreader-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    border: 0;
    pointer-events: none;
  }

   
  .js-toggle-track {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 999px;
    overflow: visible;
    background: linear-gradient(180deg, #8dceff 0%, #c7e6ff 100%);
    box-shadow:
      inset 0 1px 2px rgba(0, 0, 0, 0.15),
      inset 0 -1px 0 rgba(255, 255, 255, 0.55);
    transition: background 700ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 700ms ease;
  }
  .js-toggle--checked .js-toggle-track {
    background: linear-gradient(180deg, #0c1430 0%, #1d2a55 100%);
    box-shadow:
      inset 0 1px 2px rgba(0, 0, 0, 0.45),
      inset 0 -1px 0 rgba(255, 255, 255, 0.10);
  }

   
  .js-toggle--sunset .js-toggle-track {
    animation: skSunset 740ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .js-toggle--sunrise .js-toggle-track {
    animation: skSunrise 740ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes skSunset {
    0%   { background: linear-gradient(180deg, #8dceff 0%, #c7e6ff 100%); }
    40%  { background: linear-gradient(180deg, #ff6f3c 0%, #ffb56c 55%, #4a2f72 100%); }
    100% { background: linear-gradient(180deg, #0c1430 0%, #1d2a55 100%); }
  }
  @keyframes skSunrise {
    0%   { background: linear-gradient(180deg, #0c1430 0%, #1d2a55 100%); }
    40%  { background: linear-gradient(180deg, #ff8e44 0%, #ffc885 50%, #74a8d6 100%); }
    100% { background: linear-gradient(180deg, #8dceff 0%, #c7e6ff 100%); }
  }

   
  .sk-toggle-day,
  .sk-toggle-night {
    position: absolute;
    inset: 0;
    border-radius: 999px;
    overflow: hidden;
    pointer-events: none;
    transition: opacity 480ms ease;
  }
  .sk-toggle-day   { opacity: 1; }
  .sk-toggle-night { opacity: 0; }
  .js-toggle--checked .sk-toggle-day   { opacity: 0; }
  .js-toggle--checked .sk-toggle-night { opacity: 1; }

   
  .sk-toggle-cloud-shift {
    position: absolute;
     
    transform: translateX(calc(var(--px) * -3.5px));
    transition: transform 320ms cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }
  .sk-toggle-cloud-shift--a { top: 4px;  right: 6px;  width: 22px; height: 10px; }
  .sk-toggle-cloud-shift--b { top: 16px; right: 26px; width: 16px; height: 7px; }

  .sk-toggle-cloud {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.08));
    will-change: transform;
  }
  .sk-toggle-cloud--a {
    opacity: 0.95;
    animation: skCloudA 14s ease-in-out infinite;
  }
  .sk-toggle-cloud--b {
    opacity: 0.78;
    animation: skCloudB 18s ease-in-out infinite;
  }
  @keyframes skCloudA {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(-9px); }
  }
  @keyframes skCloudB {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(7px); }
  }

   
   
  .sk-toggle-star {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 520ms ease;
    animation: skTwinkle 2.4s ease-in-out infinite;
    will-change: opacity, transform;
  }
  .js-toggle--checked .sk-toggle-star { opacity: 1; }

   
  .sk-toggle-star:nth-child(1) { top: 5px;  left: 8px;  width: 2px;   height: 2px;   animation-delay: 0.0s; transition-delay: 0.30s; }
  .sk-toggle-star:nth-child(2) { top: 16px; left: 16px; width: 1.5px; height: 1.5px; animation-delay: 0.4s; transition-delay: 0.45s; }
  .sk-toggle-star:nth-child(3) { top: 8px;  left: 22px; width: 2.5px; height: 2.5px; animation-delay: 0.8s; transition-delay: 0.55s; }
  .sk-toggle-star:nth-child(4) { top: 22px; left: 10px; width: 1.5px; height: 1.5px; animation-delay: 1.2s; transition-delay: 0.38s; }
  .sk-toggle-star:nth-child(5) { top: 12px; left: 30px; width: 1px;   height: 1px;   animation-delay: 1.6s; transition-delay: 0.62s; }
  .sk-toggle-star:nth-child(6) { top: 6px;  left: 38px; width: 1.5px; height: 1.5px; animation-delay: 0.6s; transition-delay: 0.50s; }
  .sk-toggle-star:nth-child(7) { top: 23px; left: 36px; width: 1.5px; height: 1.5px; animation-delay: 1.8s; transition-delay: 0.66s; }
  .sk-toggle-star:nth-child(8) { top: 18px; left: 6px;  width: 1px;   height: 1px;   animation-delay: 2.1s; transition-delay: 0.42s; }

  @keyframes skTwinkle {
    0%, 100% { transform: scale(0.75); box-shadow: 0 0 2px rgba(255, 255, 255, 0.55); }
    50%      { transform: scale(1.30); box-shadow: 0 0 6px rgba(255, 255, 255, 0.95); }
  }

   
  .js-toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: radial-gradient(circle at 34% 30%, #fff6c2 0%, #ffd744 38%, #ff8e1f 100%);
    box-shadow:
      inset -2px -3px 4px rgba(150, 70, 0, 0.30),
      inset 2px 2px 3px rgba(255, 255, 255, 0.65),
      0 2px 4px rgba(0, 0, 0, 0.18);
    transition:
      transform 680ms cubic-bezier(0.34, 1.56, 0.64, 1),
      background 560ms ease,
      box-shadow 560ms ease;
    z-index: 2;
    transform: translateX(0);
  }
  .js-toggle--checked .js-toggle-thumb {
    transform: translateX(46px);
    background: radial-gradient(circle at 34% 30%, #ffffff 0%, #e7ecf6 42%, #aab2c8 100%);
    box-shadow:
      inset -2px -3px 5px rgba(40, 50, 100, 0.32),
      inset 2px 2px 4px rgba(255, 255, 255, 0.90),
      0 2px 5px rgba(0, 0, 0, 0.30);
  }
  .js-toggle:hover .js-toggle-thumb              { transform: translateX(0)    translateY(-1px) scale(1.06); }
  .js-toggle--checked:hover .js-toggle-thumb     { transform: translateX(46px) translateY(-1px) scale(1.06); }
  .js-toggle:active .js-toggle-thumb             { transform: translateX(0)    scale(0.92); }
  .js-toggle--checked:active .js-toggle-thumb    { transform: translateX(46px) scale(0.92); }

   
  .js-toggle--sunset .js-toggle-thumb,
  .js-toggle--sunrise .js-toggle-thumb {
    transition: background 560ms ease, box-shadow 560ms ease;
  }
  .js-toggle--sunset .js-toggle-thumb  { animation: skSunSet 740ms cubic-bezier(0.4, 0, 0.3, 1) forwards; }
  .js-toggle--sunrise .js-toggle-thumb { animation: skMoonRise 740ms cubic-bezier(0.4, 0, 0.3, 1) forwards; }
  @keyframes skSunSet {
    0%   { transform: translate(0,    0); }
    35%  { transform: translate(15px, 7px); }
    55%  { transform: translate(28px, 9px); }
    100% { transform: translate(46px, 0); }
  }
  @keyframes skMoonRise {
    0%   { transform: translate(46px, 0); }
    35%  { transform: translate(31px, 7px); }
    55%  { transform: translate(18px, 9px); }
    100% { transform: translate(0,    0); }
  }

   
  .sk-toggle-halo {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 175, 50, 0.55), transparent 65%);
    z-index: -1;
    opacity: 0.7;
    animation: skHalo 3.2s ease-in-out infinite;
    pointer-events: none;
  }
  .js-toggle--checked .sk-toggle-halo {
    background: radial-gradient(circle, rgba(160, 190, 255, 0.45), transparent 65%);
    animation-duration: 5s;
  }
  @keyframes skHalo {
    0%, 100% { opacity: 0.45; transform: scale(0.92); }
    50%      { opacity: 0.85; transform: scale(1.18); }
  }

   
  .sk-toggle-highlight {
    position: absolute;
    top: 22%;
    left: 28%;
    width: 7px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    filter: blur(1.5px);
    pointer-events: none;
    transform: translate(calc(var(--px) * 2.5px), calc(var(--py) * 1.5px));
    transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
    opacity: 0.85;
  }
  .js-toggle--checked .sk-toggle-highlight {
    background: rgba(255, 255, 255, 0.7);
    opacity: 1;
  }

   
  .sk-toggle-face {
    position: absolute;
    inset: 0;
    pointer-events: none;
     
    transform: translate(var(--eye-dx), var(--eye-dy));
    transition: opacity 320ms ease, transform 200ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .sk-toggle-face--sun  { opacity: 1; }
  .sk-toggle-face--moon { opacity: 0; }
  .js-toggle--checked .sk-toggle-face--sun  { opacity: 0; }
  .js-toggle--checked .sk-toggle-face--moon { opacity: 1; }

   
  .sk-toggle-face--sun .sk-toggle-eye {
    position: absolute;
    top: 7px;
    width: 2.5px; height: 3.5px;
    background: #4a2200;
    border-radius: 50%;
    transform-origin: center center;
    animation: skSunBlink 6.2s ease-in-out infinite;
  }
  .sk-toggle-face--sun .sk-toggle-eye--l { left: 6.5px; }
  .sk-toggle-face--sun .sk-toggle-eye--r { right: 6.5px; }
   
  .sk-toggle-face--sun .sk-toggle-eye--r { animation-delay: 0.04s; }
  @keyframes skSunBlink {
    0%, 94%, 100% { transform: scaleY(1); }
    96%, 98%      { transform: scaleY(0.08); }
  }

  .sk-toggle-cheek {
    position: absolute;
    width: 3px; height: 2px;
    background: rgba(255, 130, 100, 0.55);
    border-radius: 50%;
    top: 12px;
  }
  .sk-toggle-cheek--l { left: 4px; }
  .sk-toggle-cheek--r { right: 4px; }

  .sk-toggle-face--sun .sk-toggle-mouth {
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 4px;
    border: 1.4px solid #4a2200;
    border-top: 0;
    border-radius: 0 0 8px 8px;
    background: transparent;
  }

   
  .sk-toggle-face--moon .sk-toggle-eye--closed {
    position: absolute;
    top: 9px;
    width: 5px;
    height: 2px;
    background: transparent;
    border-bottom: 1.4px solid #2a3454;
    border-radius: 0 0 5px 5px;
    transform-origin: center top;
    animation: skMoonEyes 10s ease-in-out infinite;
  }
  .sk-toggle-face--moon .sk-toggle-eye--l.sk-toggle-eye--closed { left: 5px; }
  .sk-toggle-face--moon .sk-toggle-eye--r.sk-toggle-eye--closed { right: 5px; }
   
  @keyframes skMoonEyes {
    0%, 91%, 99%, 100% { transform: scaleY(1); }
    93%, 97%           { transform: scaleY(0.35); }
  }

  .sk-toggle-crater {
    position: absolute;
    background: rgba(90, 100, 140, 0.40);
    border-radius: 50%;
    box-shadow: inset 0.5px 0.5px 1px rgba(40, 50, 80, 0.45);
  }
  .sk-toggle-crater--1 { width: 4px;   height: 4px;   top: 4px;    right: 5px; }
  .sk-toggle-crater--2 { width: 3px;   height: 3px;   bottom: 4px; left: 6px; }
  .sk-toggle-crater--3 { width: 2.5px; height: 2.5px; top: 14px;   right: 3px; }

   
  .sk-toggle-yawn {
    position: absolute;
    bottom: 4px;
    left: 50%;
    width: 4.5px;
    height: 5.5px;
    background: rgba(28, 36, 70, 0.7);
    border-radius: 50%;
    transform-origin: center top;
    transform: translateX(-50%) scaleY(0);
    opacity: 0;
    box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.25);
  }
  .js-toggle--checked .sk-toggle-yawn {
    animation: skYawn 10s ease-in-out infinite;
  }
  @keyframes skYawn {
    0%, 91%, 100%   { opacity: 0; transform: translateX(-50%) scaleY(0); }
    93%, 97%        { opacity: 0.85; transform: translateX(-50%) scaleY(1); }
  }

   
  .sk-toggle-z {
    position: absolute;
    top: -4px;
    right: -8px;
    color: #ffffff;
    font-family: 'Comic Sans MS', 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 800;
    text-shadow: 0 0 4px rgba(255, 255, 255, 0.4);
    opacity: 0;
    pointer-events: none;
  }
  .js-toggle--checked .sk-toggle-z {
    animation: skZ 4.2s ease-in-out infinite;
  }
  @keyframes skZ {
    0%   { opacity: 0; transform: translateY(2px)  scale(0.5) rotate(-10deg); }
    20%  { opacity: 1; transform: translateY(-2px) scale(1.0) rotate(0deg);   }
    60%  { opacity: 0.6; transform: translateY(-8px) scale(1.1) rotate(8deg); }
    100% { opacity: 0; transform: translateY(-14px) scale(1.2) rotate(14deg); }
  }

   
  .sk-toggle-sunbeam {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1.6px;
    height: 9px;
    margin: -4.5px 0 0 -0.8px;
    background: linear-gradient(0deg, rgba(255, 200, 80, 0.95), transparent);
    border-radius: 1px;
    transform: rotate(var(--ang, 0deg)) translateY(-13px) scaleY(0);
    transform-origin: center 80%;
    opacity: 0;
    pointer-events: none;
    z-index: 1;
  }
  .js-toggle--sunset .sk-toggle-sunbeam,
  .js-toggle--sunrise .sk-toggle-sunbeam {
    animation: skSunbeam 740ms ease-out forwards;
  }
  @keyframes skSunbeam {
    0%, 22% { opacity: 0; transform: rotate(var(--ang)) translateY(-11px) scaleY(0); }
    42%     { opacity: 1; transform: rotate(var(--ang)) translateY(-14px) scaleY(1); }
    62%     { opacity: 0.75; transform: rotate(var(--ang)) translateY(-16px) scaleY(1.15); }
    100%    { opacity: 0; transform: rotate(var(--ang)) translateY(-19px) scaleY(0.6); }
  }

   
  .js-toggle--sunset .sk-toggle-cloud path,
  .js-toggle--sunrise .sk-toggle-cloud path {
    animation: skCloudWarm 740ms ease forwards;
  }
  @keyframes skCloudWarm {
    0%, 100% { fill: #ffffff; }
    35%, 60% { fill: #ffd0a0; }
  }

   
  .sk-toggle-burst {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #ffce4d;           
    box-shadow: 0 0 4px rgba(255, 200, 60, 0.7);
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0.5);
  }
  .js-toggle--checked .sk-toggle-burst {
    background: #f5f8ff;

<script>
  (function () {
    var body = document.body;
    var switcher = document.getElementsByClassName('js-toggle')[0];
    if (!switcher) return;

    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

     
    switcher.addEventListener('click', function () {
      var wasChecked = this.classList.contains('js-toggle--checked');
      this.classList.toggle('js-toggle--checked');

      if (!reduceMotion) {
        
        
        this.classList.remove('js-toggle--bursting', 'js-toggle--sunset', 'js-toggle--sunrise');
        
        void this.offsetWidth;
        this.classList.add('js-toggle--bursting');
        this.classList.add(wasChecked ? 'js-toggle--sunrise' : 'js-toggle--sunset');

        var t = this;
        window.setTimeout(function () { t.classList.remove('js-toggle--bursting'); }, 460);
        window.setTimeout(function () {
          t.classList.remove('js-toggle--sunset');
          t.classList.remove('js-toggle--sunrise');
        }, 760);
      }

      if (this.classList.contains('js-toggle--checked')) {
        body.classList.add('dark-mode');
        localStorage.setItem('darkMode', 'true');
      } else {
        body.classList.remove('dark-mode');
        window.setTimeout(function () { localStorage.removeItem('darkMode'); }, 100);
      }
    });

     
    switcher.addEventListener('keydown', function (e) {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        this.click();
      }
    });

     
    if (localStorage.getItem('darkMode')) {
      switcher.classList.add('js-toggle--checked');
      body.classList.add('dark-mode');
    }

     
    if (!reduceMotion) {
      var rect = null;
      var pendingX = 0, pendingY = 0;
      var rafScheduled = false;

      function refreshRect() { rect = switcher.getBoundingClientRect(); }

      function apply() {
        rafScheduled = false;
        switcher.style.setProperty('--eye-dx', pendingX.toFixed(2) + 'px');
        switcher.style.setProperty('--eye-dy', pendingY.toFixed(2) + 'px');
      }

      window.addEventListener('mousemove', function (e) {
        if (!rect) refreshRect();
        var cx = rect.left + rect.width / 2;
        var cy = rect.top + rect.height / 2;
        var dx = e.clientX - cx;
        var dy = e.clientY - cy;
        var dist = Math.hypot(dx, dy);
        
        var radius = Math.max(dist, 220);
        pendingX = (dx / radius) * 1.6;
        pendingY = (dy / radius) * 1.6;
        if (!rafScheduled) {
          window.requestAnimationFrame(apply);
          rafScheduled = true;
        }
      }, { passive: true });

      window.addEventListener('resize', refreshRect, { passive: true });
      window.addEventListener('scroll', refreshRect, { passive: true });
      refreshRect();

       
      switcher.addEventListener('mousemove', function (e) {
        var r = switcher.getBoundingClientRect();
        var nx = ((e.clientX - r.left) / r.width)  * 2 - 1;  
        var ny = ((e.clientY - r.top)  / r.height) * 2 - 1;
        nx = Math.max(-1, Math.min(1, nx));
        ny = Math.max(-1, Math.min(1, ny));
        switcher.style.setProperty('--px', nx.toFixed(3));
        switcher.style.setProperty('--py', ny.toFixed(3));
      }, { passive: true });

      switcher.addEventListener('mouseleave', function () {
        switcher.style.setProperty('--px', '0');
        switcher.style.setProperty('--py', '0');
      }, { passive: true });
    }
  })();

<script>
(function () {
  var canvas = document.getElementById('hero-canvas');
  var ctx    = canvas.getContext('2d');
  var W, H, nodes = [], frame = 0, animId;

   
  var COL = {
    baseEdge:   'rgba(108,140,255,',
    activeEdge: 'rgba(167,139,250,',
    nodeBase:   [108, 140, 255],
    nodeActive: [167, 139, 250],
    glowActive: [52,  211, 153],    
    signal:     [99,  230, 250],    
    cad:        [251, 191,  36],    
    cadDim:     [251, 191,  36],
    grid:       [30,  58,  138],    
  };

   
  var LAYERS = [3, 5, 7, 7, 5, 3];
  var LABELS = ['Input','Hidden','Hidden','Hidden','Hidden','Output'];

   
  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    buildNodes();
    buildGrid();
  }

  

  function buildNodes() {
    nodes = [];
    var spacingX = W / (LAYERS.length + 1);
    LAYERS.forEach(function (count, li) {
      var x     = spacingX * (li + 1);
      var span  = (count - 1) * (H / 10);
      var start = H / 2 - span / 2;
      for (var ni = 0; ni < count; ni++) {
        var y = count === 1 ? H / 2 : start + ni * (span / (count - 1));
        nodes.push({
          x: x, y: y, layer: li, idx: ni,
          r: 5 + Math.random() * 3,
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: 0.018 + Math.random() * 0.012,
          active: Math.random() > 0.4,
          activationTimer:    Math.random() * 120,
          activationDuration: 40 + Math.random() * 60,
        });
      }
    });
  }

  function layerNodes(li) {
    return nodes.filter(function (n) { return n.layer === li; });
  }

  

  var GRID_W = 14, GRID_H = 8;
  var gridPts = [];

  function buildGrid() {
    gridPts = [];
    var marginX = W * 0.05, marginY = H * 0.1;
    for (var j = 0; j <= GRID_H; j++) {
      var row = [];
      for (var i = 0; i <= GRID_W; i++) {
        row.push({
          bx: marginX + i * (W - marginX * 2) / GRID_W,
          by: marginY + j * (H - marginY * 2) / GRID_H,
          phase: i * 0.4 + j * 0.55,
        });
      }
      gridPts.push(row);
    }
  }

  function drawGrid(t) {
    ctx.lineWidth   = 0.4;
    ctx.strokeStyle = 'rgba(30,58,138,0.22)';

     
    for (var j = 0; j <= GRID_H; j++) {
      ctx.beginPath();
      for (var i = 0; i <= GRID_W; i++) {
        var p = gridPts[j][i];
        var dy = Math.sin(t * 0.6 + p.phase) * 7;
        var x  = p.bx, y = p.by + dy;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
     
    for (var i = 0; i <= GRID_W; i++) {
      ctx.beginPath();
      for (var j = 0; j <= GRID_H; j++) {
        var p = gridPts[j][i];
        var dy = Math.sin(t * 0.6 + p.phase) * 7;
        var x  = p.bx, y = p.by + dy;
        j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }

  

  var TOKENS = [];
  var TOKEN_LABELS = ['text→CAD','point→mesh','img→3D','NURBS','B-Rep','∇loss','σ=0.8','latent z','mesh','voxel'];

  function spawnToken() {
    TOKENS.push({
      x:     W * 0.15 + Math.random() * W * 0.7,
      y:     H + 20,
      label: TOKEN_LABELS[Math.floor(Math.random() * TOKEN_LABELS.length)],
      speed: 0.25 + Math.random() * 0.35,
      alpha: 0,
      life:  0,
      maxLife: 220 + Math.random() * 120,
    });
  }

  function drawTokens() {
     
    if (frame % 55 === 0) spawnToken();

    TOKENS = TOKENS.filter(function (tk) { return tk.life < tk.maxLife; });
    TOKENS.forEach(function (tk) {
      tk.life++;
      tk.y -= tk.speed;
       
      var prog = tk.life / tk.maxLife;
      tk.alpha = prog < 0.15 ? prog / 0.15
               : prog > 0.75 ? (1 - prog) / 0.25
               : 1.0;
      tk.alpha *= 0.55;

      var pad = 6, fSize = 9;
      ctx.font = '500 ' + fSize + 'px "DM Mono", monospace';
      var tw   = ctx.measureText(tk.label).width;
      var bw   = tw + pad * 2, bh = fSize + pad * 2;

      ctx.save();
      ctx.globalAlpha = tk.alpha;
       
      ctx.fillStyle = 'rgba(14,30,64,0.85)';
      ctx.beginPath();
      roundRect(ctx, tk.x - bw / 2, tk.y - bh / 2, bw, bh, 4);
      ctx.fill();
       
      ctx.strokeStyle = 'rgba(99,179,237,0.5)';
      ctx.lineWidth   = 0.6;
      ctx.stroke();
       
      ctx.fillStyle   = 'rgba(186,230,253,0.95)';
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(tk.label, tk.x, tk.y);
      ctx.restore();
    });
  }

  function roundRect(c, x, y, w, h, r) {
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r);
    c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h);
    c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y, x + r, y);
  }

  

  var scanY = 0;
  function drawScan(t) {
    scanY = (scanY + 0.8) % H;
    var grad = ctx.createLinearGradient(0, scanY - 60, 0, scanY + 60);
    grad.addColorStop(0,   'rgba(99,179,237,0)');
    grad.addColorStop(0.5, 'rgba(99,179,237,0.04)');
    grad.addColorStop(1,   'rgba(99,179,237,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, scanY - 60, W, 120);
  }

  

  function draw() {
    var t = frame * 0.016;
    ctx.clearRect(0, 0, W, H);
    frame++;

     
    if (frame % 2 === 0) drawGrid(t);

     
    drawScan(t);

     
     
    nodes.forEach(function (n) {
      n.activationTimer++;
      if (n.activationTimer > n.activationDuration) {
        n.active = Math.random() > 0.35;
        n.activationTimer = 0;
        n.activationDuration = 50 + Math.random() * 80;
      }
      n.pulse += n.pulseSpeed;
    });

     
    for (var li = 0; li < LAYERS.length - 1; li++) {
      var from = layerNodes(li);
      var to   = layerNodes(li + 1);
      from.forEach(function (a) {
        to.forEach(function (b) {
          var both  = a.active && b.active;
          var prog  = Math.sin(frame * 0.025 + a.pulse) * 0.5 + 0.5;
          var alpha = both
            ? 0.22 + prog * 0.18
            : 0.05 + prog * 0.04;

          var mx = (a.x + b.x) / 2;
          var my = (a.y + b.y) / 2 + Math.sin(a.pulse) * 18;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.quadraticCurveTo(mx, my, b.x, b.y);

          if (both) {
            ctx.strokeStyle = COL.activeEdge + alpha + ')';
            ctx.lineWidth   = 0.9;
          } else {
            ctx.strokeStyle = COL.baseEdge + alpha + ')';
            ctx.lineWidth   = 0.5;
          }
          ctx.stroke();

           
          if (both && Math.sin(frame * 0.018 + a.idx) > 0.7) {
            var tt  = (frame * 0.005 + a.pulse * 0.3) % 1;
            var mt  = 1 - tt;
            var sx  = mt * mt * a.x + 2 * mt * tt * mx + tt * tt * b.x;
            var sy  = mt * mt * a.y + 2 * mt * tt * my + tt * tt * b.y;
            ctx.beginPath();
            ctx.arc(sx, sy, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(52,211,153,0.88)';
            ctx.fill();
          }
        });
      });
    }

     
    nodes.forEach(function (n) {
      var pulsed = n.r + Math.sin(n.pulse) * 1.2;
      var col    = n.active ? COL.nodeActive : COL.nodeBase;
      var nr = col[0], ng = col[1], nb = col[2];
      var alpha  = n.active ? 0.95 : 0.35;

       
      if (n.active) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, pulsed * 4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(52,211,153,0.08)';
        ctx.fill();
      }

       
      ctx.beginPath();
      ctx.arc(n.x, n.y, pulsed + 2.5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(' + nr + ',' + ng + ',' + nb + ',' + (alpha * 0.4) + ')';
      ctx.lineWidth = 1;
      ctx.stroke();

       
      ctx.beginPath();
      ctx.arc(n.x, n.y, pulsed, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + nr + ',' + ng + ',' + nb + ',' + alpha + ')';
      ctx.fill();
    });

     
    var spacingX = W / (LAYERS.length + 1);
    ctx.font      = '500 11px "DM Mono", monospace';
    ctx.textAlign = 'center';
    LAYERS.forEach(function (_, li) {
      var lnodes = layerNodes(li);
      var topY   = Math.min.apply(null, lnodes.map(function (n) { return n.y; }));
      ctx.fillStyle = 'rgba(250,160,100,1.0)';
      ctx.fillText(LABELS[li] || 'Hidden', spacingX * (li + 1), topY - 18);
    });

     
    drawTokens();

    animId = setTimeout(function() {
  requestAnimationFrame(draw);
}, 1000 / 30);
  }

   
  resize();
  draw();
  window.addEventListener('resize', function () {
    clearTimeout(animId);
    resize();
    draw();
  });
})();
</script>


<script>
(function () {
  var inp   = document.getElementById('search');
  var dots  = document.getElementById('pub-typing');
  var timer = null;
  if (!inp || !dots) return;
  inp.addEventListener('input', function () {
    if (inp.value.length > 0) {
      dots.classList.add('active');
      clearTimeout(timer);
      timer = setTimeout(function () { dots.classList.remove('active'); }, 600);
    } else {
      clearTimeout(timer);
      dots.classList.remove('active');
    }
  });
})();
</script>
