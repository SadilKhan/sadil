<style>

 

.js-toggle-wrapper {
    display: table;
    margin: 0 auto;
}

.js-toggle {
    touch-action: pan-x;
    display: inline-block;
    position: relative;
    cursor: pointer;
    background-color: transparent;
    border: 0;
    padding: 0;
    -webkit-touch-callout: none;
    user-select: none;
    -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
    -webkit-tap-highlight-color: transparent;
  }

  .js-toggle-screenreader-only {
    border: 0;
    clip: rect(0 0 0 0);
    height: 1px;
    margin: -1px;
    overflow: hidden;
    padding: 0;
    position: absolute;
    width: 1px;
  }

  .js-toggle-track {
    width: 50px;
    height: 24px;
    padding: 0;
    border-radius: 30px;
    background-color: hsl(222, 14%, 7%);
    transition: all 0.2s ease;
  }

  .js-toggle-track-check {
    position: absolute;
    width: 17px;
    height: 17px;
    left: 5px;
    top: 0px;
    bottom: 0px;
    margin-top: auto;
    margin-bottom: auto;
    line-height: 0;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .js-toggle--checked .js-toggle-track-check {
    opacity: 1;
    transition: opacity 0.25s ease;
  }

  .js-toggle-track-x {
    position: absolute;
    width: 17px;
    height: 17px;
    right: 5px;
    top: 0px;
    bottom: 0px;
    margin-top: auto;
    margin-bottom: auto;
    line-height: 0;
    opacity: 1;
    transition: opacity 0.25s ease;
  }

  .js-toggle--checked .js-toggle-track-x {
    opacity: 0;
  }

  .js-toggle-thumb {
    position: absolute;
    top: 1px;
    left: 1px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background-color: #fafafa;
    box-sizing: border-box;
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0ms;
    transform: translateX(0);
  }

  .js-toggle--checked .js-toggle-thumb {
    transform: translateX(26px);
    border-color: #19ab27;
  }

  .js-toggle--focus .js-toggle-thumb {
    box-shadow: 0px 0px 2px 3px rgb(255, 167, 196);
  }

  .js-toggle:active .js-toggle-thumb {
    box-shadow: 0px 0px 5px 5px rgb(255, 167, 196);
  }
</style>

<script>
    var body = document.body;
	var switcher = document.getElementsByClassName('js-toggle')[0];

	
	switcher.addEventListener("click", function() {
        this.classList.toggle('js-toggle--checked');
        this.classList.add('js-toggle--focus');
		
		if (this.classList.contains('js-toggle--checked')) {
			body.classList.add('dark-mode');
			
			localStorage.setItem('darkMode', 'true');
		} else {
			body.classList.remove('dark-mode');
			setTimeout(function() {
				localStorage.removeItem('darkMode');
			}, 100);
		}
	})

	
	if (localStorage.getItem('darkMode')) {
		
        switcher.classList.add('js-toggle--checked');
        body.classList.add('dark-mode');
	}

</script>

<script>
(function () {
  var canvas = document.getElementById('hero-canvas');
  var ctx    = canvas.getContext('2d');
  var W, H, nodes = [], frame = 0, animId;

   
  var COL = {
    baseEdge:   'rgba(108,140,255,',
    activeEdge: 'rgba(167,139,250,',
    nodeBase:   [108, 140, 255],
    nodeActive: [167, 139, 250],
    glowActive: [52,  211, 153],    
    signal:     [99,  230, 250],    
    cad:        [251, 191,  36],    
    cadDim:     [251, 191,  36],
    grid:       [30,  58,  138],    
  };

   
  var LAYERS = [3, 5, 7, 7, 5, 3];
  var LABELS = ['Input','Hidden','Hidden','Hidden','Hidden','Output'];

   
  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    buildNodes();
    buildCAD();
    buildGrid();
  }

  

  function buildNodes() {
    nodes = [];
    var spacingX = W / (LAYERS.length + 1);
    LAYERS.forEach(function (count, li) {
      var x     = spacingX * (li + 1);
      var span  = (count - 1) * (H / 10);
      var start = H / 2 - span / 2;
      for (var ni = 0; ni < count; ni++) {
        var y = count === 1 ? H / 2 : start + ni * (span / (count - 1));
        nodes.push({
          x: x, y: y, layer: li, idx: ni,
          r: 5 + Math.random() * 3,
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: 0.018 + Math.random() * 0.012,
          active: Math.random() > 0.4,
          activationTimer:    Math.random() * 120,
          activationDuration: 40 + Math.random() * 60,
        });
      }
    });
  }

  function layerNodes(li) {
    return nodes.filter(function (n) { return n.layer === li; });
  }

  

  var cadAngle = 0;
  var CAD_CUBES = [];    

  function buildCAD() {
    CAD_CUBES = [
      { cx: W * 0.12, cy: H * 0.22, size: 42, speed: 0.007, phase: 0.0 },
      { cx: W * 0.88, cy: H * 0.28, size: 36, speed: 0.009, phase: 1.1 },
      { cx: W * 0.50, cy: H * 0.82, size: 28, speed: 0.006, phase: 2.3 },
    ];
  }

  function project(px, py, pz, cx, cy, rx, ry) {
     
    var cosY = Math.cos(ry), sinY = Math.sin(ry);
    var x1 = px * cosY - pz * sinY;
    var z1 = px * sinY + pz * cosY;
    var cosX = Math.cos(rx), sinX = Math.sin(rx);
    var y2 = py * cosX - z1 * sinX;
    var z2 = py * sinX + z1 * cosX;
    var fov = 3.5;
    var sc  = fov / (fov + z2);
    return { x: cx + x1 * sc, y: cy + y2 * sc };
  }

  function drawCube(c, t) {
    var s   = c.size;
    var ry  = t * c.speed + c.phase;
    var rx  = t * c.speed * 0.6 + c.phase * 0.7;
    var v   = [
      [-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],
      [-s,-s, s],[s,-s, s],[s,s, s],[-s,s, s],
    ].map(function (p) { return project(p[0],p[1],p[2], c.cx, c.cy, rx, ry); });

    var edges = [
      [0,1],[1,2],[2,3],[3,0],
      [4,5],[5,6],[6,7],[7,4],
      [0,4],[1,5],[2,6],[3,7],
    ];
    var alpha = 0.28 + 0.12 * Math.sin(t * 0.8 + c.phase);
    ctx.strokeStyle = 'rgba(251,191,36,' + alpha + ')';
    ctx.lineWidth   = 0.8;
    edges.forEach(function (e) {
      ctx.beginPath();
      ctx.moveTo(v[e[0]].x, v[e[0]].y);
      ctx.lineTo(v[e[1]].x, v[e[1]].y);
      ctx.stroke();
    });

     
    v.forEach(function (p, i) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(251,191,36,' + (alpha * 1.6) + ')';
      ctx.fill();
    });
  }

  

  var GRID_W = 14, GRID_H = 8;
  var gridPts = [];

  function buildGrid() {
    gridPts = [];
    var marginX = W * 0.05, marginY = H * 0.1;
    for (var j = 0; j <= GRID_H; j++) {
      var row = [];
      for (var i = 0; i <= GRID_W; i++) {
        row.push({
          bx: marginX + i * (W - marginX * 2) / GRID_W,
          by: marginY + j * (H - marginY * 2) / GRID_H,
          phase: i * 0.4 + j * 0.55,
        });
      }
      gridPts.push(row);
    }
  }

  function drawGrid(t) {
    ctx.lineWidth   = 0.4;
    ctx.strokeStyle = 'rgba(30,58,138,0.22)';

     
    for (var j = 0; j <= GRID_H; j++) {
      ctx.beginPath();
      for (var i = 0; i <= GRID_W; i++) {
        var p = gridPts[j][i];
        var dy = Math.sin(t * 0.6 + p.phase) * 7;
        var x  = p.bx, y = p.by + dy;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
     
    for (var i = 0; i <= GRID_W; i++) {
      ctx.beginPath();
      for (var j = 0; j <= GRID_H; j++) {
        var p = gridPts[j][i];
        var dy = Math.sin(t * 0.6 + p.phase) * 7;
        var x  = p.bx, y = p.by + dy;
        j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }

  

  var TOKENS = [];
  var TOKEN_LABELS = ['textâ†’CAD','pointâ†’mesh','imgâ†’3D','NURBS','B-Rep','âˆ‡loss','Ïƒ=0.8','latent z','mesh','voxel'];

  function spawnToken() {
    TOKENS.push({
      x:     W * 0.15 + Math.random() * W * 0.7,
      y:     H + 20,
      label: TOKEN_LABELS[Math.floor(Math.random() * TOKEN_LABELS.length)],
      speed: 0.25 + Math.random() * 0.35,
      alpha: 0,
      life:  0,
      maxLife: 220 + Math.random() * 120,
    });
  }

  function drawTokens() {
     
    if (frame % 55 === 0) spawnToken();

    TOKENS = TOKENS.filter(function (tk) { return tk.life < tk.maxLife; });
    TOKENS.forEach(function (tk) {
      tk.life++;
      tk.y -= tk.speed;
       
      var prog = tk.life / tk.maxLife;
      tk.alpha = prog < 0.15 ? prog / 0.15
               : prog > 0.75 ? (1 - prog) / 0.25
               : 1.0;
      tk.alpha *= 0.55;

      var pad = 6, fSize = 9;
      ctx.font = '500 ' + fSize + 'px "DM Mono", monospace';
      var tw   = ctx.measureText(tk.label).width;
      var bw   = tw + pad * 2, bh = fSize + pad * 2;

      ctx.save();
      ctx.globalAlpha = tk.alpha;
       
      ctx.fillStyle = 'rgba(14,30,64,0.85)';
      ctx.beginPath();
      roundRect(ctx, tk.x - bw / 2, tk.y - bh / 2, bw, bh, 4);
      ctx.fill();
       
      ctx.strokeStyle = 'rgba(99,179,237,0.5)';
      ctx.lineWidth   = 0.6;
      ctx.stroke();
       
      ctx.fillStyle   = 'rgba(186,230,253,0.95)';
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(tk.label, tk.x, tk.y);
      ctx.restore();
    });
  }

  function roundRect(c, x, y, w, h, r) {
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r);
    c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h);
    c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y, x + r, y);
  }

  

  var scanY = 0;
  function drawScan(t) {
    scanY = (scanY + 0.8) % H;
    var grad = ctx.createLinearGradient(0, scanY - 60, 0, scanY + 60);
    grad.addColorStop(0,   'rgba(99,179,237,0)');
    grad.addColorStop(0.5, 'rgba(99,179,237,0.04)');
    grad.addColorStop(1,   'rgba(99,179,237,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, scanY - 60, W, 120);
  }

  

  function draw() {
    var t = frame * 0.016;
    ctx.clearRect(0, 0, W, H);
    frame++;

     
    if (frame % 2 === 0) drawGrid(t);

     
    drawScan(t);

     

     
     
    nodes.forEach(function (n) {
      n.activationTimer++;
      if (n.activationTimer > n.activationDuration) {
        n.active = Math.random() > 0.35;
        n.activationTimer = 0;
        n.activationDuration = 50 + Math.random() * 80;
      }
      n.pulse += n.pulseSpeed;
    });

     
    for (var li = 0; li < LAYERS.length - 1; li++) {
      var from = layerNodes(li);
      var to   = layerNodes(li + 1);
      from.forEach(function (a) {
        to.forEach(function (b) {
          var both  = a.active && b.active;
          var prog  = Math.sin(frame * 0.025 + a.pulse) * 0.5 + 0.5;
          var alpha = both
            ? 0.22 + prog * 0.18
            : 0.05 + prog * 0.04;

          var mx = (a.x + b.x) / 2;
          var my = (a.y + b.y) / 2 + Math.sin(a.pulse) * 18;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.quadraticCurveTo(mx, my, b.x, b.y);

          if (both) {
            ctx.strokeStyle = COL.activeEdge + alpha + ')';
            ctx.lineWidth   = 0.9;
          } else {
            ctx.strokeStyle = COL.baseEdge + alpha + ')';
            ctx.lineWidth   = 0.5;
          }
          ctx.stroke();

           
          if (both && Math.sin(frame * 0.018 + a.idx) > 0.7) {
            var tt  = (frame * 0.005 + a.pulse * 0.3) % 1;
            var mt  = 1 - tt;
            var sx  = mt * mt * a.x + 2 * mt * tt * mx + tt * tt * b.x;
            var sy  = mt * mt * a.y + 2 * mt * tt * my + tt * tt * b.y;
            ctx.beginPath();
            ctx.arc(sx, sy, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(52,211,153,0.88)';
            ctx.fill();
          }
        });
      });
    }

     
    nodes.forEach(function (n) {
      var pulsed = n.r + Math.sin(n.pulse) * 1.2;
      var col    = n.active ? COL.nodeActive : COL.nodeBase;
      var nr = col[0], ng = col[1], nb = col[2];
      var alpha  = n.active ? 0.95 : 0.35;

       
      if (n.active) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, pulsed * 4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(52,211,153,0.08)';
        ctx.fill();
      }

       
      ctx.beginPath();
      ctx.arc(n.x, n.y, pulsed + 2.5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(' + nr + ',' + ng + ',' + nb + ',' + (alpha * 0.4) + ')';
      ctx.lineWidth = 1;
      ctx.stroke();

       
      ctx.beginPath();
      ctx.arc(n.x, n.y, pulsed, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + nr + ',' + ng + ',' + nb + ',' + alpha + ')';
      ctx.fill();
    });

     
    var spacingX = W / (LAYERS.length + 1);
    ctx.font      = '500 11px "DM Mono", monospace';
    ctx.textAlign = 'center';
    LAYERS.forEach(function (_, li) {
      var lnodes = layerNodes(li);
      var topY   = Math.min.apply(null, lnodes.map(function (n) { return n.y; }));
      ctx.fillStyle = 'rgba(250,160,100,1.0)';
      ctx.fillText(LABELS[li] || 'Hidden', spacingX * (li + 1), topY - 18);
    });

     

    animId = setTimeout(function() {
  requestAnimationFrame(draw);
}, 1000 / 30);
  }

   
  resize();
  draw();
  window.addEventListener('resize', function () {
    cancelAnimationFrame(animId);
    resize();
    draw();
  });
})();
</script>


<script>
(function () {
  var inp   = document.getElementById('search');
  var dots  = document.getElementById('pub-typing');
  var timer = null;
  if (!inp || !dots) return;
  inp.addEventListener('input', function () {
    if (inp.value.length > 0) {
      dots.classList.add('active');
      clearTimeout(timer);
      timer = setTimeout(function () { dots.classList.remove('active'); }, 600);
    } else {
      clearTimeout(timer);
      dots.classList.remove('active');
    }
  });
})();
</script>
