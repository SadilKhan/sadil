<style>

 

.js-toggle-wrapper {
    display: table;
    margin: 0 auto;
}

.js-toggle {
    touch-action: pan-x;
    display: inline-block;
    position: relative;
    cursor: pointer;
    background-color: transparent;
    border: 0;
    padding: 0;
    -webkit-touch-callout: none;
    user-select: none;
    -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
    -webkit-tap-highlight-color: transparent;
  }

  .js-toggle-screenreader-only {
    border: 0;
    clip: rect(0 0 0 0);
    height: 1px;
    margin: -1px;
    overflow: hidden;
    padding: 0;
    position: absolute;
    width: 1px;
  }

  .js-toggle-track {
    width: 50px;
    height: 24px;
    padding: 0;
    border-radius: 30px;
    background-color: hsl(222, 14%, 7%);
    transition: all 0.2s ease;
  }

  .js-toggle-track-check {
    position: absolute;
    width: 17px;
    height: 17px;
    left: 5px;
    top: 0px;
    bottom: 0px;
    margin-top: auto;
    margin-bottom: auto;
    line-height: 0;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .js-toggle--checked .js-toggle-track-check {
    opacity: 1;
    transition: opacity 0.25s ease;
  }

  .js-toggle-track-x {
    position: absolute;
    width: 17px;
    height: 17px;
    right: 5px;
    top: 0px;
    bottom: 0px;
    margin-top: auto;
    margin-bottom: auto;
    line-height: 0;
    opacity: 1;
    transition: opacity 0.25s ease;
  }

  .js-toggle--checked .js-toggle-track-x {
    opacity: 0;
  }

  .js-toggle-thumb {
    position: absolute;
    top: 1px;
    left: 1px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background-color: #fafafa;
    box-sizing: border-box;
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0ms;
    transform: translateX(0);
  }

  .js-toggle--checked .js-toggle-thumb {
    transform: translateX(26px);
    border-color: #19ab27;
  }

  .js-toggle--focus .js-toggle-thumb {
    box-shadow: 0px 0px 2px 3px rgb(255, 167, 196);
  }

  .js-toggle:active .js-toggle-thumb {
    box-shadow: 0px 0px 5px 5px rgb(255, 167, 196);
  }
</style>

<script>
    var body = document.body;
	var switcher = document.getElementsByClassName('js-toggle')[0];

	
	switcher.addEventListener("click", function() {
        this.classList.toggle('js-toggle--checked');
        this.classList.add('js-toggle--focus');
		
		if (this.classList.contains('js-toggle--checked')) {
			body.classList.add('dark-mode');
			
			localStorage.setItem('darkMode', 'true');
		} else {
			body.classList.remove('dark-mode');
			setTimeout(function() {
				localStorage.removeItem('darkMode');
			}, 100);
		}
	})

	
	if (localStorage.getItem('darkMode')) {
		
        switcher.classList.add('js-toggle--checked');
        body.classList.add('dark-mode');
	}

</script>

  </div>

  
  <div class="cv-section">
    <h2 class="cv-section-title">Education</h2>
    <div id="cv-education"><div class="cv-loading"><i class="fa-solid fa-circle-notch fa-spin"></i>&nbsp; Loading…</div></div>
  </div>

<script>
(function () {
  function logoHtml(item) {
    if (item.logo) {
      return '<div class="cv-logo-wrap">' +
        '<img src="' + item.logo + '" alt="' + item.org + '" ' +
        'onerror="this.parentNode.innerHTML=\'<div class=&quot;cv-logo-placeholder&quot;><i class=&quot;fa-solid fa-building&quot;></i></div>\'">' +
        '</div>';
    }
    return '<div class="cv-logo-wrap"><div class="cv-logo-placeholder"><i class="fa-solid fa-building"></i></div></div>';
  }

  function buildCard(item, isEdu) {
    var desc = (!isEdu && item.desc)
      ? '<p class="cv-desc">' + item.desc + '</p>' : '';

    return '<div class="cv-card' + (isEdu ? ' cv-card--edu' : '') + '">' +
      logoHtml(item) +
      '<div class="cv-card-body">' +
        '<div class="cv-card-info">' +
          '<div class="cv-role">'  + item.role     + '</div>' +
          '<div class="cv-org">'   + item.org      + '</div>' +
          '<div class="cv-loc"><i class="fa-solid fa-location-dot"></i>' + item.location + '</div>' +
          desc +
        '</div>' +
        '<div class="cv-date">' + item.date + '</div>' +
      '</div>' +
    '</div>';
  }
  fetch('cv.json')
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function (data) {
      document.getElementById('cv-experience').innerHTML =
        data.experience.map(function (i) { return buildCard(i, false); }).join('');
      document.getElementById('cv-education').innerHTML =
        data.education.map(function (i) { return buildCard(i, true); }).join('');
    })
    .catch(function (err) {
      var msg = '<div class="cv-loading">⚠ Could not load CV data — ' + err.message + '</div>';
      document.getElementById('cv-experience').innerHTML = msg;
      document.getElementById('cv-education').innerHTML  = msg;
    });
})();
</script>
