<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="rl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1207"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#rl-bg)"/>

  <!-- Grid -->
  <g stroke="#1a1a0d" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Panel 1: RL Loop -->
  <rect x="30" y="60" width="220" height="330" rx="10" fill="#111107" stroke="#713f12" stroke-width="1"/>
  <text x="140" y="88" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11" font-weight="600" letter-spacing="1">RL LOOP</text>

  <g transform="translate(55, 110)">
    <!-- Agent box -->
    <rect x="35" y="0" width="100" height="36" rx="6" fill="#1c1400" stroke="#d97706" stroke-width="1.2"/>
    <text x="85" y="22" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="600">Agent π</text>

    <!-- Action arrow down -->
    <line x1="85" y1="36" x2="85" y2="65" stroke="#d97706" stroke-width="1.5"/>
    <polygon points="85,68 81,62 89,62" fill="#d97706"/>
    <text x="115" y="56" fill="#6b5a00" font-family="monospace" font-size="8">action a_t</text>

    <!-- Environment box -->
    <rect x="35" y="68" width="100" height="36" rx="6" fill="#1c1400" stroke="#f59e0b" stroke-width="1"/>
    <text x="85" y="90" text-anchor="middle" fill="#fde68a" font-family="monospace" font-size="10">Env</text>

    <!-- Reward + state arrow right then up -->
    <line x1="135" y1="86" x2="165" y2="86" stroke="#10b981" stroke-width="1.5"/>
    <line x1="165" y1="86" x2="165" y2="18" stroke="#10b981" stroke-width="1.5"/>
    <line x1="165" y1="18" x2="135" y2="18" stroke="#10b981" stroke-width="1.5"/>
    <polygon points="135,18 141,14 141,22" fill="#10b981"/>
    <text x="173" y="56" fill="#065f46" font-family="monospace" font-size="8">r_t, s_{t+1}</text>

    <!-- Value function -->
    <text x="85" y="148" text-anchor="middle" fill="#92400e" font-family="monospace" font-size="9" font-weight="600">Value Function</text>
    <rect x="10" y="155" width="150" height="30" rx="5" fill="#1c1400" stroke="#78350f" stroke-width="0.8"/>
    <text x="85" y="174" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">V(s) = E[Σ γᵗ r_t]</text>

    <!-- Policy gradient -->
    <text x="85" y="215" text-anchor="middle" fill="#92400e" font-family="monospace" font-size="9" font-weight="600">Policy Gradient</text>
    <rect x="0" y="222" width="170" height="30" rx="5" fill="#1c1400" stroke="#78350f" stroke-width="0.8"/>
    <text x="85" y="241" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">∇J(θ) = E[∇logπ · A(s,a)]</text>
  </g>

  <!-- Panel 2: PPO / GRPO -->
  <rect x="290" y="60" width="220" height="330" rx="10" fill="#111107" stroke="#1e3a5f" stroke-width="1"/>
  <text x="400" y="88" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="11" font-weight="600" letter-spacing="1">PPO / GRPO</text>

  <g transform="translate(310, 108)">
    <!-- Clip objective -->
    <text x="90" y="15" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="9" font-weight="600">Clipped Objective</text>
    <rect x="0" y="22" width="180" height="42" rx="5" fill="#0c1929" stroke="#1d4ed8" stroke-width="0.8"/>
    <text x="90" y="41" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="8.5">L = min(r·A, clip(r,1-ε,1+ε)·A)</text>
    <text x="90" y="57" text-anchor="middle" fill="#1e40af" font-family="monospace" font-size="8">r = π_θ(a|s) / π_old(a|s)</text>

    <!-- Clip visualization -->
    <text x="90" y="90" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="9" font-weight="600">Trust Region</text>
    <rect x="20" y="97" width="140" height="55" rx="5" fill="#0c1929" stroke="#1d4ed8" stroke-width="0.8"/>
    <!-- ratio axis -->
    <line x1="30" y1="140" x2="150" y2="140" stroke="#374151" stroke-width="1"/>
    <line x1="90" y1="105" x2="90"  y2="145" stroke="#374151" stroke-width="0.8" stroke-dasharray="3,2"/>
    <!-- clipped function shape -->
    <polyline points="30,135 65,120 90,110 115,120 150,115" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="60" y1="100" x2="60" y2="145" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2,2"/>
    <line x1="120" y1="100" x2="120" y2="145" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2,2"/>
    <text x="60"  y="150" text-anchor="middle" fill="#dc2626" font-family="monospace" font-size="7">1-ε</text>
    <text x="120" y="150" text-anchor="middle" fill="#dc2626" font-family="monospace" font-size="7">1+ε</text>

    <!-- GRPO -->
    <text x="90" y="175" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="9" font-weight="600">GRPO (Group Relative)</text>
    <rect x="0" y="182" width="180" height="55" rx="5" fill="#0c1929" stroke="#1d4ed8" stroke-width="0.8"/>
    <text x="90" y="200" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="8">Sample G outputs per prompt</text>
    <text x="90" y="215" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="8">A_i = (r_i − mean(r)) / std(r)</text>
    <text x="90" y="230" text-anchor="middle" fill="#1e40af" font-family="monospace" font-size="7.5">No critic · group baseline</text>
  </g>

  <!-- Panel 3: Q-Learning -->
  <rect x="550" y="60" width="220" height="330" rx="10" fill="#111107" stroke="#4a1942" stroke-width="1"/>
  <text x="660" y="88" text-anchor="middle" fill="#e879f9" font-family="monospace" font-size="11" font-weight="600" letter-spacing="1">Q-LEARNING</text>

  <g transform="translate(568, 108)">
    <!-- Bellman -->
    <text x="92" y="15" text-anchor="middle" fill="#f0abfc" font-family="monospace" font-size="9" font-weight="600">Bellman Update</text>
    <rect x="0" y="22" width="184" height="42" rx="5" fill="#1a0d24" stroke="#86198f" stroke-width="0.8"/>
    <text x="92" y="40" text-anchor="middle" fill="#e879f9" font-family="monospace" font-size="8.5">Q(s,a) ← Q(s,a) +</text>
    <text x="92" y="57" text-anchor="middle" fill="#e879f9" font-family="monospace" font-size="8.5">α[r + γ max Q(s',a') - Q(s,a)]</text>

    <!-- Q-table heatmap -->
    <text x="92" y="88" text-anchor="middle" fill="#f0abfc" font-family="monospace" font-size="9" font-weight="600">Q-Table</text>
    <rect x="15" y="95" width="154" height="80" rx="5" fill="#1a0d24" stroke="#86198f" stroke-width="0.8"/>
    <g font-family="monospace" font-size="7.5" text-anchor="middle" fill="#86198f">
      <text x="62"  y="112">↑</text><text x="92"  y="112">↓</text><text x="122" y="112">←</text><text x="152" y="112">→</text>
    </g>
    <g font-family="monospace" font-size="7.5" fill="#6b21a8">
      <text x="26" y="128">S0</text><text x="26" y="145">S1</text><text x="26" y="162">S2</text>
    </g>
    <!-- cells -->
    <rect x="42"  y="117" width="28" height="16" rx="2" fill="#4a1942" opacity="0.5"/>
    <rect x="74"  y="117" width="28" height="16" rx="2" fill="#7e22ce" opacity="0.6"/>
    <rect x="106" y="117" width="28" height="16" rx="2" fill="#4a1942" opacity="0.4"/>
    <rect x="138" y="117" width="28" height="16" rx="2" fill="#a855f7" opacity="0.8"/>
    <rect x="42"  y="135" width="28" height="16" rx="2" fill="#7e22ce" opacity="0.7"/>
    <rect x="74"  y="135" width="28" height="16" rx="2" fill="#c026d3" opacity="0.9"/>
    <rect x="106" y="135" width="28" height="16" rx="2" fill="#7e22ce" opacity="0.6"/>
    <rect x="138" y="135" width="28" height="16" rx="2" fill="#4a1942" opacity="0.4"/>
    <rect x="42"  y="152" width="28" height="16" rx="2" fill="#4a1942" opacity="0.35"/>
    <rect x="74"  y="152" width="28" height="16" rx="2" fill="#7e22ce" opacity="0.5"/>
    <rect x="106" y="152" width="28" height="16" rx="2" fill="#a855f7" opacity="0.75"/>
    <rect x="138" y="152" width="28" height="16" rx="2" fill="#7e22ce" opacity="0.6"/>

    <!-- DQN -->
    <text x="92" y="210" text-anchor="middle" fill="#f0abfc" font-family="monospace" font-size="9" font-weight="600">DQN Extensions</text>
    <rect x="0" y="218" width="184" height="65" rx="5" fill="#1a0d24" stroke="#86198f" stroke-width="0.8"/>
    <text x="92" y="234" text-anchor="middle" fill="#c026d3" font-family="monospace" font-size="8">Experience Replay Buffer</text>
    <text x="92" y="249" text-anchor="middle" fill="#c026d3" font-family="monospace" font-size="8">Target Network (frozen copy)</text>
    <text x="92" y="264" text-anchor="middle" fill="#86198f" font-family="monospace" font-size="8">Double DQN · Dueling Arch</text>
    <text x="92" y="277" text-anchor="middle" fill="#86198f" font-family="monospace" font-size="8">Prioritized Replay</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="410" width="800" height="40" fill="#0a0900" opacity="0.8"/>
  <text x="400" y="432" text-anchor="middle" fill="#374151" font-family="monospace" font-size="11" letter-spacing="2">AI NOTEBOOK · REINFORCEMENT LEARNING</text>
  <text x="30"  y="432" text-anchor="start"  fill="#3d2a00" font-family="monospace" font-size="10">5 posts</text>
  <text x="770" y="432" text-anchor="end"    fill="#3d2a00" font-family="monospace" font-size="10">PPO · GRPO · DQN · agentic</text>
</svg>
