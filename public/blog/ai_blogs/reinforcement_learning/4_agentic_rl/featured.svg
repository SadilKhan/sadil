<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agentic RL — agent invoking tools in a loop">
  <style>
    .bg { fill: #0a0c10; }
    .ring { stroke: rgba(138, 180, 248, 0.18); stroke-width: 1.4; fill: none; }
    .agent { fill: #1a3a7a; stroke: #8ab4f8; stroke-width: 1.8; }
    .tool  { fill: #181c23; stroke: rgba(138, 180, 248, 0.45); stroke-width: 1.3; }
    .tool-text { font: 800 18px 'Plus Jakarta Sans', sans-serif; fill: #e8eaed; text-anchor: middle; }
    .tool-name { font: 600 9.5px 'JetBrains Mono', monospace; fill: rgba(138, 180, 248, 0.78); text-anchor: middle; letter-spacing: 0.10em; text-transform: uppercase; }
    .agent-text { font: 800 13px 'Plus Jakarta Sans', sans-serif; fill: #ffffff; text-anchor: middle; letter-spacing: 0.06em; text-transform: uppercase; }
    .action { stroke: #fbbc04; stroke-width: 1.6; fill: none; stroke-linecap: round; opacity: 0.85; filter: drop-shadow(0 0 4px rgba(251, 188, 4, 0.45)); }
    .obs    { stroke: #34a853; stroke-width: 1.4; fill: none; stroke-linecap: round; opacity: 0.65; stroke-dasharray: 3 4; }
    .reward { fill: #ea4335; }
    .title { font: 800 13px 'Plus Jakarta Sans', sans-serif; fill: #e8eaed; letter-spacing: 0.04em; }
    .sub  { font: 600 10px 'JetBrains Mono', monospace; fill: rgba(138, 180, 248, 0.60); letter-spacing: 0.10em; text-transform: uppercase; }

    @keyframes agent-pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }
    @keyframes tool-activate {
      0%, 75%, 100% { fill: #181c23; stroke: rgba(138, 180, 248, 0.45); }
      35%, 50%      { fill: rgba(251, 188, 4, 0.18); stroke: #fbbc04; }
    }
    @keyframes ar-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes ar-action-pulse {
      0%   { offset-distance: 0%;  opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    .agent-g  { animation: agent-pulse 3s ease-in-out infinite; transform-origin: 300px 200px; transform-box: view-box; }
    .ring-rot { animation: ar-spin 18s linear infinite; transform-origin: 300px 200px; }

    .tool-1 { animation: tool-activate 7s ease infinite; animation-delay: 0s;   transform-origin: center; transform-box: fill-box; }
    .tool-2 { animation: tool-activate 7s ease infinite; animation-delay: 1.4s; transform-origin: center; transform-box: fill-box; }
    .tool-3 { animation: tool-activate 7s ease infinite; animation-delay: 2.8s; transform-origin: center; transform-box: fill-box; }
    .tool-4 { animation: tool-activate 7s ease infinite; animation-delay: 4.2s; transform-origin: center; transform-box: fill-box; }
    .tool-5 { animation: tool-activate 7s ease infinite; animation-delay: 5.6s; transform-origin: center; transform-box: fill-box; }

    .action-bead { animation: ar-action-pulse 3.4s ease-in-out infinite; }
    .ab-1 { offset-path: path('M 300 200 L 188 116'); }
    .ab-2 { offset-path: path('M 300 200 L 432 130'); animation-delay: 0.7s; }
    .ab-3 { offset-path: path('M 300 200 L 460 270'); animation-delay: 1.4s; }
    .ab-4 { offset-path: path('M 300 200 L 300 318'); animation-delay: 2.1s; }
    .ab-5 { offset-path: path('M 300 200 L 140 270'); animation-delay: 2.8s; }
    @media (prefers-reduced-motion: reduce) {
      .agent-g, .ring-rot, .tool-1, .tool-2, .tool-3, .tool-4, .tool-5, .action-bead { animation: none; }
    }
  </style>

  <rect class="bg" width="600" height="400"/>

  <!-- header -->
  <text class="sub"   x="40" y="38">agentic RL · multi-step tool use</text>
  <text class="title" x="40" y="58">An agent that picks tools, observes, repeats.</text>

  <!-- outer rotating ring -->
  <g class="ring-rot">
    <circle class="ring" cx="300" cy="200" r="120" stroke-dasharray="6 8"/>
    <circle class="ring" cx="300" cy="200" r="142" stroke-dasharray="2 14" opacity="0.6"/>
  </g>

  <!-- action lines (agent → tool) -->
  <line class="action" x1="300" y1="200" x2="188" y2="116"/>
  <line class="action" x1="300" y1="200" x2="432" y2="130"/>
  <line class="action" x1="300" y1="200" x2="460" y2="270"/>
  <line class="action" x1="300" y1="200" x2="300" y2="318"/>
  <line class="action" x1="300" y1="200" x2="140" y2="270"/>

  <!-- observation back-paths (dashed) -->
  <path class="obs" d="M 188 116 Q 240 60, 320 120 Q 360 156, 300 200"/>
  <path class="obs" d="M 432 130 Q 480 200, 420 240 Q 360 270, 300 200"/>

  <!-- 5 tools around the agent -->
  <g class="tool-1">
    <circle class="tool" cx="188" cy="116" r="34"/>
    <text class="tool-text" x="188" y="121">🔍</text>
    <text class="tool-name" x="188" y="166">search</text>
  </g>
  <g class="tool-2">
    <circle class="tool" cx="432" cy="130" r="34"/>
    <text class="tool-text" x="432" y="135">∑</text>
    <text class="tool-name" x="432" y="180">calc</text>
  </g>
  <g class="tool-3">
    <circle class="tool" cx="460" cy="270" r="34"/>
    <text class="tool-text" x="460" y="275">{ }</text>
    <text class="tool-name" x="460" y="320">code</text>
  </g>
  <g class="tool-4">
    <circle class="tool" cx="300" cy="318" r="34"/>
    <text class="tool-text" x="300" y="324">⌘</text>
    <text class="tool-name" x="300" y="364">shell</text>
  </g>
  <g class="tool-5">
    <circle class="tool" cx="140" cy="270" r="34"/>
    <text class="tool-text" x="140" y="275">🌐</text>
    <text class="tool-name" x="140" y="320">browser</text>
  </g>

  <!-- central agent -->
  <g class="agent-g">
    <circle class="agent" cx="300" cy="200" r="44"/>
    <text class="agent-text" x="300" y="206">AGENT</text>
  </g>

  <!-- action beads -->
  <circle class="reward action-bead ab-1" r="4"/>
  <circle class="reward action-bead ab-2" r="4"/>
  <circle class="reward action-bead ab-3" r="4"/>
  <circle class="reward action-bead ab-4" r="4"/>
  <circle class="reward action-bead ab-5" r="4"/>
</svg>
