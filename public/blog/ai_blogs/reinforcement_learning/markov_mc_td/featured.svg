<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="mk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07090d"/>
      <stop offset="100%" stop-color="#0d1318"/>
    </linearGradient>
    <marker id="arr-b" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#4285f4" opacity="0.7"/>
    </marker>
    <marker id="arr-g" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#34a853" opacity="0.7"/>
    </marker>
    <marker id="arr-y" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#fbbc04" opacity="0.7"/>
    </marker>
    <marker id="arr-p" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#a142f4" opacity="0.7"/>
    </marker>
    <marker id="arr-t" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#24c1e0" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="800" height="450" fill="url(#mk-bg)"/>

  <!-- Grid lines -->
  <g stroke="#1e2a3a" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="267" y1="0" x2="267" y2="450"/>
    <line x1="534" y1="0" x2="534" y2="450"/>
  </g>

  <!-- ═══ Panel 1: Markov Chain ═══ -->
  <rect x="20" y="50" width="230" height="350" rx="10" fill="#0f1318" stroke="#1e2a3a" stroke-width="1"/>
  <text x="135" y="78" text-anchor="middle" fill="#8ab4f8" font-family="monospace" font-size="11" font-weight="600" letter-spacing="1">MARKOV CHAIN</text>

  <g transform="translate(135, 130)">
    <!-- Study node -->
    <circle cx="0" cy="-50" r="22" fill="#0d2040" stroke="#4285f4" stroke-width="1.5"/>
    <text x="0" y="-46" text-anchor="middle" fill="#8ab4f8" font-family="monospace" font-size="8" font-weight="600">Study</text>

    <!-- Pass node -->
    <circle cx="65" cy="10" r="20" fill="#0d2a1a" stroke="#34a853" stroke-width="1.5"/>
    <text x="65" y="14" text-anchor="middle" fill="#81c995" font-family="monospace" font-size="8" font-weight="600">Pass</text>

    <!-- Distracted node -->
    <circle cx="-65" cy="10" r="22" fill="#1a1a0d" stroke="#fbbc04" stroke-width="1.5"/>
    <text x="-65" y="6" text-anchor="middle" fill="#fdd663" font-family="monospace" font-size="7" font-weight="600">Dist-</text>
    <text x="-65" y="17" text-anchor="middle" fill="#fdd663" font-family="monospace" font-size="7" font-weight="600">racted</text>

    <!-- Phone node -->
    <circle cx="-65" cy="90" r="20" fill="#1a0d1a" stroke="#a142f4" stroke-width="1.5"/>
    <text x="-65" y="94" text-anchor="middle" fill="#c58af9" font-family="monospace" font-size="8" font-weight="600">Phone</text>

    <!-- Sleep node (terminal) -->
    <circle cx="0" cy="155" r="22" fill="#0d1a1a" stroke="#24c1e0" stroke-width="1.5"/>
    <circle cx="0" cy="155" r="18" fill="none" stroke="#24c1e0" stroke-width="0.8" opacity="0.5"/>
    <text x="0" y="159" text-anchor="middle" fill="#78d9ec" font-family="monospace" font-size="8" font-weight="600">Sleep</text>

    <!-- Arrows: Study → Pass (0.7) -->
    <line x1="18" y1="-35" x2="52" y2="-3" stroke="#34a853" stroke-width="1.2" marker-end="url(#arr-g)" opacity="0.8"/>
    <text x="44" y="-28" fill="#34a853" font-family="monospace" font-size="8">0.7</text>

    <!-- Study → Distracted (0.3) -->
    <line x1="-18" y1="-35" x2="-52" y2="-3" stroke="#fbbc04" stroke-width="1.2" marker-end="url(#arr-y)" opacity="0.8"/>
    <text x="-50" y="-30" fill="#fbbc04" font-family="monospace" font-size="8">0.3</text>

    <!-- Distracted → Study (0.5) -->
    <path d="M -62 -12 Q -80 -30 -10 -52" fill="none" stroke="#4285f4" stroke-width="1" marker-end="url(#arr-b)" opacity="0.7" stroke-dasharray="3,2"/>
    <text x="-72" y="-38" fill="#4285f4" font-family="monospace" font-size="7">0.5</text>

    <!-- Distracted → Phone (0.5) -->
    <line x1="-65" y1="32" x2="-65" y2="68" stroke="#a142f4" stroke-width="1.2" marker-end="url(#arr-p)" opacity="0.8"/>
    <text x="-54" y="55" fill="#c58af9" font-family="monospace" font-size="8">0.5</text>

    <!-- Pass → Sleep -->
    <line x1="52" y1="27" x2="18" y2="135" stroke="#24c1e0" stroke-width="1.2" marker-end="url(#arr-t)" opacity="0.8"/>
    <text x="48" y="90" fill="#78d9ec" font-family="monospace" font-size="8">1.0</text>

    <!-- Phone → Sleep -->
    <line x1="-50" y1="104" x2="-16" y2="138" stroke="#24c1e0" stroke-width="1.2" marker-end="url(#arr-t)" opacity="0.8"/>
    <text x="-45" y="130" fill="#78d9ec" font-family="monospace" font-size="8">1.0</text>
  </g>

  <text x="135" y="360" text-anchor="middle" fill="#374151" font-family="monospace" font-size="8">P(s'|s) — arrows sum to 1</text>

  <!-- ═══ Panel 2: MDP / Bellman ═══ -->
  <rect x="285" y="50" width="230" height="350" rx="10" fill="#0f1318" stroke="#1e2a3a" stroke-width="1"/>
  <text x="400" y="78" text-anchor="middle" fill="#fdd663" font-family="monospace" font-size="11" font-weight="600" letter-spacing="1">MDP + BELLMAN</text>

  <g transform="translate(310, 100)">
    <!-- Bellman equation -->
    <text x="90" y="18" text-anchor="middle" fill="#fdd663" font-family="monospace" font-size="9" font-weight="600">Bellman Equation</text>
    <rect x="0" y="26" width="180" height="44" rx="6" fill="#1a1500" stroke="#78600a" stroke-width="0.8"/>
    <text x="90" y="42" text-anchor="middle" fill="#fbbc04" font-family="monospace" font-size="8.5">V(s) = E[r + γ V(s')]</text>
    <text x="90" y="60" text-anchor="middle" fill="#78600a" font-family="monospace" font-size="8">current value = reward + discounted future</text>

    <!-- Backup diagram -->
    <text x="90" y="92" text-anchor="middle" fill="#fdd663" font-family="monospace" font-size="9" font-weight="600">Backup Diagram</text>
    <!-- Root state -->
    <circle cx="90" cy="118" r="16" fill="#1a1500" stroke="#fbbc04" stroke-width="1.5"/>
    <text x="90" y="122" text-anchor="middle" fill="#fdd663" font-family="monospace" font-size="8">s</text>
    <!-- Action nodes -->
    <circle cx="55" cy="158" r="10" fill="#1a1200" stroke="#78600a" stroke-width="1"/>
    <text x="55" y="162" text-anchor="middle" fill="#fbbc04" font-family="monospace" font-size="7">a₁</text>
    <circle cx="125" cy="158" r="10" fill="#1a1200" stroke="#78600a" stroke-width="1"/>
    <text x="125" y="162" text-anchor="middle" fill="#fbbc04" font-family="monospace" font-size="7">a₂</text>
    <!-- Next state nodes -->
    <circle cx="30" cy="200" r="13" fill="#0d2040" stroke="#4285f4" stroke-width="1"/>
    <text x="30" y="204" text-anchor="middle" fill="#8ab4f8" font-family="monospace" font-size="7">s'₁</text>
    <circle cx="80" cy="200" r="13" fill="#0d2040" stroke="#4285f4" stroke-width="1"/>
    <text x="80" y="204" text-anchor="middle" fill="#8ab4f8" font-family="monospace" font-size="7">s'₂</text>
    <circle cx="150" cy="200" r="13" fill="#0d2040" stroke="#4285f4" stroke-width="1"/>
    <text x="150" y="204" text-anchor="middle" fill="#8ab4f8" font-family="monospace" font-size="7">s'₃</text>
    <!-- Arrows -->
    <line x1="80" y1="130" x2="58" y2="148" stroke="#fbbc04" stroke-width="1" opacity="0.7"/>
    <line x1="100" y1="130" x2="122" y2="148" stroke="#fbbc04" stroke-width="1" opacity="0.7"/>
    <line x1="50" y1="168" x2="37" y2="188" stroke="#4285f4" stroke-width="1" opacity="0.7"/>
    <line x1="60" y1="168" x2="76" y2="188" stroke="#4285f4" stroke-width="1" opacity="0.7"/>
    <line x1="128" y1="168" x2="144" y2="188" stroke="#4285f4" stroke-width="1" opacity="0.7"/>
    <!-- reward labels -->
    <text x="26" y="226" text-anchor="middle" fill="#34a853" font-family="monospace" font-size="7">r=+1</text>
    <text x="80" y="226" text-anchor="middle" fill="#374151" font-family="monospace" font-size="7">r= 0</text>
    <text x="150" y="226" text-anchor="middle" fill="#ea4335" font-family="monospace" font-size="7">r=-1</text>
    <text x="90" y="250" text-anchor="middle" fill="#374151" font-family="monospace" font-size="8">γ discounts future rewards</text>
  </g>

  <!-- ═══ Panel 3: MC vs TD spectrum ═══ -->
  <rect x="550" y="50" width="230" height="350" rx="10" fill="#0f1318" stroke="#1e2a3a" stroke-width="1"/>
  <text x="665" y="78" text-anchor="middle" fill="#f28b82" font-family="monospace" font-size="11" font-weight="600" letter-spacing="1">MC vs TD</text>

  <g transform="translate(565, 100)">
    <!-- MC box -->
    <text x="100" y="18" text-anchor="middle" fill="#c58af9" font-family="monospace" font-size="9" font-weight="600">Monte Carlo</text>
    <rect x="20" y="26" width="160" height="55" rx="6" fill="#1a0d24" stroke="#a142f4" stroke-width="0.8"/>
    <text x="100" y="44" text-anchor="middle" fill="#c58af9" font-family="monospace" font-size="8">Wait for full episode</text>
    <text x="100" y="59" text-anchor="middle" fill="#7c3aed" font-family="monospace" font-size="8">G_t = r_t + γr_{t+1} + ...</text>
    <text x="100" y="74" text-anchor="middle" fill="#7c3aed" font-family="monospace" font-size="7.5">low bias · high variance</text>

    <!-- TD box -->
    <text x="100" y="105" text-anchor="middle" fill="#f28b82" font-family="monospace" font-size="9" font-weight="600">Temporal Difference</text>
    <rect x="20" y="113" width="160" height="55" rx="6" fill="#1a0d0d" stroke="#ea4335" stroke-width="0.8"/>
    <text x="100" y="131" text-anchor="middle" fill="#f28b82" font-family="monospace" font-size="8">Update after one step</text>
    <text x="100" y="146" text-anchor="middle" fill="#c0392b" font-family="monospace" font-size="8">δ = r + γV(s') - V(s)</text>
    <text x="100" y="161" text-anchor="middle" fill="#c0392b" font-family="monospace" font-size="7.5">high bias · low variance</text>

    <!-- Spectrum dial -->
    <text x="100" y="192" text-anchor="middle" fill="#78d9ec" font-family="monospace" font-size="9" font-weight="600">The n-step Dial</text>
    <rect x="10" y="200" width="180" height="55" rx="6" fill="#0d1a1a" stroke="#24c1e0" stroke-width="0.8"/>
    <!-- dial bar -->
    <rect x="25" y="218" width="150" height="6" rx="3" fill="#1e2a3a"/>
    <rect x="25" y="218" width="150" height="6" rx="3" fill="url(#dial-grad)" opacity="0.7"/>
    <defs>
      <linearGradient id="dial-grad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#ea4335"/>
        <stop offset="100%" stop-color="#a142f4"/>
      </linearGradient>
    </defs>
    <!-- tick marks -->
    <line x1="25" y1="216" x2="25" y2="226" stroke="#374151" stroke-width="1"/>
    <line x1="100" y1="216" x2="100" y2="226" stroke="#374151" stroke-width="1"/>
    <line x1="175" y1="216" x2="175" y2="226" stroke="#374151" stroke-width="1"/>
    <text x="25"  y="238" text-anchor="middle" fill="#f28b82" font-family="monospace" font-size="7">TD(0)</text>
    <text x="100" y="238" text-anchor="middle" fill="#78d9ec" font-family="monospace" font-size="7">n-step</text>
    <text x="175" y="238" text-anchor="middle" fill="#c58af9" font-family="monospace" font-size="7">MC</text>
    <!-- GAE label -->
    <circle cx="80" cy="221" r="4" fill="#fbbc04"/>
    <text x="80" y="252" text-anchor="middle" fill="#fbbc04" font-family="monospace" font-size="7">GAE (PPO)</text>

    <!-- Algorithms table -->
    <text x="100" y="278" text-anchor="middle" fill="#78d9ec" font-family="monospace" font-size="9" font-weight="600">Where Algorithms Live</text>
    <rect x="10" y="285" width="180" height="55" rx="5" fill="#0d1a1a" stroke="#1e2a3a" stroke-width="0.8"/>
    <text x="22" y="300" fill="#f28b82" font-family="monospace" font-size="7.5">TD(0)  →  Q-learning, SARSA</text>
    <text x="22" y="315" fill="#78d9ec" font-family="monospace" font-size="7.5">n-step →  TD(λ), GAE, A3C</text>
    <text x="22" y="330" fill="#c58af9" font-family="monospace" font-size="7.5">MC     →  REINFORCE</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="410" width="800" height="40" fill="#04060a" opacity="0.9"/>
  <text x="400" y="432" text-anchor="middle" fill="#374151" font-family="monospace" font-size="11" letter-spacing="2">AI NOTEBOOK · REINFORCEMENT LEARNING</text>
  <text x="30"  y="432" text-anchor="start"  fill="#1e3a5f" font-family="monospace" font-size="10">~25 min</text>
  <text x="770" y="432" text-anchor="end"    fill="#1e3a5f" font-family="monospace" font-size="10">Markov · MDP · MC · TD</text>
</svg>
