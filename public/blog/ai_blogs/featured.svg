<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" role="img" aria-label="AI Notebook">
  <defs>
    <linearGradient id="aiBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1224"/>
      <stop offset="55%" stop-color="#172447"/>
      <stop offset="100%" stop-color="#2a1a52"/>
    </linearGradient>
    <radialGradient id="aiGlow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#7ea8ff" stop-opacity=".22"/>
      <stop offset="60%" stop-color="#7ea8ff" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#7ea8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nodeBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8ab4f8"/>
      <stop offset="100%" stop-color="#4285f4"/>
    </linearGradient>
    <linearGradient id="nodeTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ef3ff"/>
      <stop offset="100%" stop-color="#24c1e0"/>
    </linearGradient>
    <linearGradient id="nodePurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c58af9"/>
      <stop offset="100%" stop-color="#a142f4"/>
    </linearGradient>
    <linearGradient id="nodeGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81c995"/>
      <stop offset="100%" stop-color="#34a853"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      .conn { stroke: #5d7fbf; stroke-width: 1.1; fill: none; opacity: .35; }
      .conn-bright { stroke: #8ab4f8; stroke-width: 1.4; fill: none; opacity: .55;
        stroke-dasharray: 4 6; animation: dash 2.4s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -40; } }

      .pulse { animation: pulse 2.8s ease-in-out infinite; transform-origin: center; transform-box: fill-box; will-change: transform, opacity; }
      .pulse-2 { animation-delay: .35s; }
      .pulse-3 { animation-delay: .7s; }
      .pulse-4 { animation-delay: 1.05s; }
      .pulse-5 { animation-delay: 1.4s; }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: .9; }
        50% { transform: scale(1.18); opacity: 1; }
      }

      .bead { fill: #e8edf5; will-change: offset-distance, opacity; }
      .b1 { offset-path: path('M 130 130 L 320 100'); animation: travel 2.4s cubic-bezier(.4,.1,.6,.9) infinite; }
      .b2 { offset-path: path('M 130 225 L 320 225'); animation: travel 2.4s cubic-bezier(.4,.1,.6,.9) .3s infinite; }
      .b3 { offset-path: path('M 130 320 L 320 350'); animation: travel 2.4s cubic-bezier(.4,.1,.6,.9) .6s infinite; }
      .b4 { offset-path: path('M 320 100 L 500 130'); animation: travel 2.4s cubic-bezier(.4,.1,.6,.9) .9s infinite; }
      .b5 { offset-path: path('M 320 225 L 500 225'); animation: travel 2.4s cubic-bezier(.4,.1,.6,.9) 1.2s infinite; }
      .b6 { offset-path: path('M 320 350 L 500 320'); animation: travel 2.4s cubic-bezier(.4,.1,.6,.9) 1.5s infinite; }
      .b7 { offset-path: path('M 500 130 L 680 225'); animation: travel 2.4s cubic-bezier(.4,.1,.6,.9) 1.8s infinite; }
      .b8 { offset-path: path('M 500 225 L 680 225'); animation: travel 2.4s cubic-bezier(.4,.1,.6,.9) 2.1s infinite; }
      .b9 { offset-path: path('M 500 320 L 680 225'); animation: travel 2.4s cubic-bezier(.4,.1,.6,.9) 0s infinite; }
      @keyframes travel {
        0% { offset-distance: 0%; opacity: 0; }
        15% { opacity: 1; }
        85% { opacity: 1; }
        100% { offset-distance: 100%; opacity: 0; }
      }

      .core { transform-origin: 680px 225px; animation: corePulse 2.4s ease-in-out infinite; will-change: transform; }
      @keyframes corePulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }
      .ring { transform-origin: 680px 225px; transform-box: fill-box; animation: spin 12s linear infinite; will-change: transform; }
      @keyframes spin { to { transform: rotate(360deg); } }

      .label { font-family: 'JetBrains Mono', ui-monospace, monospace; fill: #b8c8e0; opacity: .55; letter-spacing: .14em; }
      .title { font-family: 'Plus Jakarta Sans', 'Google Sans', system-ui, sans-serif; font-weight: 700; fill: #e8edf5; }
      .sub { font-family: 'JetBrains Mono', ui-monospace, monospace; fill: #b8c8e0; opacity: .72; letter-spacing: .12em; }

      .scan { animation: scanMove 5s ease-in-out infinite; will-change: transform, opacity; }
      @keyframes scanMove {
        0%, 100% { transform: translateX(0); opacity: 0; }
        15% { opacity: .55; }
        85% { opacity: .55; }
        50% { transform: translateX(560px); }
      }
    ]]></style>
  </defs>

  <rect width="800" height="450" fill="url(#aiBg)"/>
  <rect width="800" height="450" fill="url(#aiGlow)"/>

  <g opacity=".25">
    <path d="M0 90 H800 M0 180 H800 M0 270 H800 M0 360 H800" stroke="#2a3a5e" stroke-width=".5" stroke-dasharray="2 6"/>
    <path d="M120 0 V450 M280 0 V450 M440 0 V450 M600 0 V450 M760 0 V450" stroke="#2a3a5e" stroke-width=".5" stroke-dasharray="2 6"/>
  </g>

  <g class="scan">
    <rect x="80" y="60" width="3" height="330" fill="url(#nodeTeal)" opacity=".45"/>
  </g>

  <g>
    <line class="conn" x1="130" y1="130" x2="320" y2="100"/>
    <line class="conn-bright" x1="130" y1="130" x2="320" y2="225"/>
    <line class="conn" x1="130" y1="130" x2="320" y2="350"/>
    <line class="conn" x1="130" y1="225" x2="320" y2="100"/>
    <line class="conn-bright" x1="130" y1="225" x2="320" y2="225"/>
    <line class="conn" x1="130" y1="225" x2="320" y2="350"/>
    <line class="conn" x1="130" y1="320" x2="320" y2="100"/>
    <line class="conn-bright" x1="130" y1="320" x2="320" y2="225"/>
    <line class="conn" x1="130" y1="320" x2="320" y2="350"/>

    <line class="conn" x1="320" y1="100" x2="500" y2="130"/>
    <line class="conn-bright" x1="320" y1="100" x2="500" y2="225"/>
    <line class="conn" x1="320" y1="100" x2="500" y2="320"/>
    <line class="conn" x1="320" y1="225" x2="500" y2="130"/>
    <line class="conn-bright" x1="320" y1="225" x2="500" y2="225"/>
    <line class="conn" x1="320" y1="225" x2="500" y2="320"/>
    <line class="conn" x1="320" y1="350" x2="500" y2="130"/>
    <line class="conn-bright" x1="320" y1="350" x2="500" y2="225"/>
    <line class="conn" x1="320" y1="350" x2="500" y2="320"/>

    <line class="conn-bright" x1="500" y1="130" x2="680" y2="225"/>
    <line class="conn-bright" x1="500" y1="225" x2="680" y2="225"/>
    <line class="conn-bright" x1="500" y1="320" x2="680" y2="225"/>
  </g>

  <g filter="url(#softGlow)">
    <circle class="pulse" cx="130" cy="130" r="11" fill="url(#nodeBlue)"/>
    <circle class="pulse pulse-2" cx="130" cy="225" r="11" fill="url(#nodeBlue)"/>
    <circle class="pulse pulse-3" cx="130" cy="320" r="11" fill="url(#nodeBlue)"/>

    <circle class="pulse pulse-2" cx="320" cy="100" r="13" fill="url(#nodeTeal)"/>
    <circle class="pulse pulse-3" cx="320" cy="225" r="13" fill="url(#nodeTeal)"/>
    <circle class="pulse pulse-4" cx="320" cy="350" r="13" fill="url(#nodeTeal)"/>

    <circle class="pulse pulse-3" cx="500" cy="130" r="13" fill="url(#nodePurple)"/>
    <circle class="pulse pulse-4" cx="500" cy="225" r="13" fill="url(#nodePurple)"/>
    <circle class="pulse pulse-5" cx="500" cy="320" r="13" fill="url(#nodePurple)"/>
  </g>

  <g class="ring">
    <circle cx="680" cy="225" r="32" fill="none" stroke="#7ef3ff" stroke-width="1.2" stroke-dasharray="4 7" opacity=".7"/>
    <circle cx="680" cy="225" r="44" fill="none" stroke="#81c995" stroke-width=".8" stroke-dasharray="2 9" opacity=".5"/>
  </g>
  <g class="core" filter="url(#softGlow)">
    <circle cx="680" cy="225" r="20" fill="url(#nodeGreen)"/>
    <circle cx="680" cy="225" r="9" fill="#e8edf5" opacity=".95"/>
  </g>

  <circle class="bead b1" cx="0" cy="0" r="2.4"/>
  <circle class="bead b2" cx="0" cy="0" r="2.4"/>
  <circle class="bead b3" cx="0" cy="0" r="2.4"/>
  <circle class="bead b4" cx="0" cy="0" r="2.4"/>
  <circle class="bead b5" cx="0" cy="0" r="2.4"/>
  <circle class="bead b6" cx="0" cy="0" r="2.4"/>
  <circle class="bead b7" cx="0" cy="0" r="2.4"/>
  <circle class="bead b8" cx="0" cy="0" r="2.4"/>
  <circle class="bead b9" cx="0" cy="0" r="2.4"/>

  <g>
    <text class="label" x="130" y="392" text-anchor="middle" font-size="9">INPUT</text>
    <text class="label" x="320" y="392" text-anchor="middle" font-size="9">HIDDEN</text>
    <text class="label" x="500" y="392" text-anchor="middle" font-size="9">ATTENTION</text>
    <text class="label" x="680" y="392" text-anchor="middle" font-size="9">OUTPUT</text>
  </g>

  <g>
    <text class="sub" x="44" y="56" font-size="11">// AI_NOTEBOOK.v1</text>
    <text class="title" x="44" y="430" font-size="22">AI Notebook</text>
    <text class="sub" x="200" y="430" font-size="10">post training · RL · attention</text>
  </g>
</svg>
