<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Attention and FlashAttention">
  <defs>
    <linearGradient id="attnBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060810"/>
      <stop offset="55%" stop-color="#0c1228"/>
      <stop offset="100%" stop-color="#180a2c"/>
    </linearGradient>
    <radialGradient id="attnGlow" cx="40%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#4285f4" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#4285f4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ab4f8" stop-opacity=".0"/>
      <stop offset="40%" stop-color="#8ab4f8" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#8ab4f8" stop-opacity=".0"/>
    </linearGradient>
    <style><![CDATA[
      .lbl { font-family: 'JetBrains Mono', ui-monospace, monospace; }
      .title { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; font-weight: 800; }

      .pq { animation: matpls 3s ease-in-out infinite; will-change: opacity; }
      .pk { animation: matpls 3s ease-in-out .6s infinite; will-change: opacity; }
      .pv { animation: matpls 3s ease-in-out 1.2s infinite; will-change: opacity; }
      @keyframes matpls { 0%,100%{opacity:.7} 50%{opacity:1} }

      .scan { animation: scanX 3.8s ease-in-out infinite; will-change: transform, opacity; }
      @keyframes scanX {
        0%,100%{ transform:translateX(0); opacity:0 }
        8%{ opacity:.65 }
        92%{ opacity:.65 }
        50%{ transform:translateX(160px) }
      }

      .bead { fill:#cce4ff; will-change:offset-distance,opacity; }
      .bq { offset-path:path('M 156 120 L 232 140'); animation:btravel 2.6s cubic-bezier(.4,.1,.6,.9) infinite; }
      .bk { offset-path:path('M 156 180 L 232 200'); animation:btravel 2.6s cubic-bezier(.4,.1,.6,.9) .9s infinite; }
      @keyframes btravel {
        0%{ offset-distance:0%; opacity:0 }
        15%{ opacity:1 }
        85%{ opacity:1 }
        100%{ offset-distance:100%; opacity:0 }
      }

      .tp  { animation: tilepls 2.2s ease-in-out infinite; will-change:opacity; }
      .tp2 { animation-delay:.55s; }
      .tp3 { animation-delay:1.1s; }
      .tp4 { animation-delay:1.65s; }
      @keyframes tilepls { 0%,75%,100%{opacity:.6} 38%{opacity:1} }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#attnBg)"/>
  <rect width="800" height="450" fill="url(#attnGlow)"/>

  <!-- Subtle grid -->
  <g opacity=".14">
    <path d="M0 90 H800 M0 180 H800 M0 270 H800 M0 360 H800" stroke="#2a3a5e" stroke-width=".5" stroke-dasharray="2 7"/>
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#2a3a5e" stroke-width=".5" stroke-dasharray="2 7"/>
  </g>

  <!-- ═══ Q, K, V matrices ═══ -->
  <!-- Q (purple) -->
  <g class="pq">
    <rect x="44" y="72" width="30" height="216" rx="4" fill="rgba(160,64,220,.18)" stroke="#c058f8" stroke-width="1.2"/>
    <rect x="46" y="74"  width="26" height="24" rx="2" fill="rgba(192,88,248,.45)"/>
    <rect x="46" y="100" width="26" height="24" rx="2" fill="rgba(192,88,248,.65)"/>
    <rect x="46" y="126" width="26" height="24" rx="2" fill="rgba(192,88,248,.28)"/>
    <rect x="46" y="152" width="26" height="24" rx="2" fill="rgba(192,88,248,.72)"/>
    <rect x="46" y="178" width="26" height="24" rx="2" fill="rgba(192,88,248,.38)"/>
    <rect x="46" y="204" width="26" height="24" rx="2" fill="rgba(192,88,248,.58)"/>
    <rect x="46" y="230" width="26" height="24" rx="2" fill="rgba(192,88,248,.48)"/>
    <rect x="46" y="256" width="26" height="24" rx="2" fill="rgba(192,88,248,.32)"/>
  </g>
  <text class="lbl" x="59" y="65" text-anchor="middle" font-size="10" fill="#c058f8" font-weight="700">Q</text>

  <!-- K (green) -->
  <g class="pk">
    <rect x="82" y="72" width="30" height="216" rx="4" fill="rgba(42,144,74,.18)" stroke="#48ba6a" stroke-width="1.2"/>
    <rect x="84" y="74"  width="26" height="24" rx="2" fill="rgba(72,186,106,.42)"/>
    <rect x="84" y="100" width="26" height="24" rx="2" fill="rgba(72,186,106,.26)"/>
    <rect x="84" y="126" width="26" height="24" rx="2" fill="rgba(72,186,106,.62)"/>
    <rect x="84" y="152" width="26" height="24" rx="2" fill="rgba(72,186,106,.38)"/>
    <rect x="84" y="178" width="26" height="24" rx="2" fill="rgba(72,186,106,.70)"/>
    <rect x="84" y="204" width="26" height="24" rx="2" fill="rgba(72,186,106,.48)"/>
    <rect x="84" y="230" width="26" height="24" rx="2" fill="rgba(72,186,106,.55)"/>
    <rect x="84" y="256" width="26" height="24" rx="2" fill="rgba(72,186,106,.30)"/>
  </g>
  <text class="lbl" x="97" y="65" text-anchor="middle" font-size="10" fill="#48ba6a" font-weight="700">K</text>

  <!-- V (orange) -->
  <g class="pv">
    <rect x="120" y="72" width="30" height="216" rx="4" fill="rgba(200,96,16,.18)" stroke="#ff8a2a" stroke-width="1.2"/>
    <rect x="122" y="74"  width="26" height="24" rx="2" fill="rgba(255,138,42,.32)"/>
    <rect x="122" y="100" width="26" height="24" rx="2" fill="rgba(255,138,42,.56)"/>
    <rect x="122" y="126" width="26" height="24" rx="2" fill="rgba(255,138,42,.42)"/>
    <rect x="122" y="152" width="26" height="24" rx="2" fill="rgba(255,138,42,.68)"/>
    <rect x="122" y="178" width="26" height="24" rx="2" fill="rgba(255,138,42,.36)"/>
    <rect x="122" y="204" width="26" height="24" rx="2" fill="rgba(255,138,42,.52)"/>
    <rect x="122" y="230" width="26" height="24" rx="2" fill="rgba(255,138,42,.44)"/>
    <rect x="122" y="256" width="26" height="24" rx="2" fill="rgba(255,138,42,.72)"/>
  </g>
  <text class="lbl" x="135" y="65" text-anchor="middle" font-size="10" fill="#ff8a2a" font-weight="700">V</text>

  <!-- Arrow Q×Kᵀ → heatmap -->
  <line x1="158" y1="180" x2="228" y2="180" stroke="#8ab4f8" stroke-width="1.3" stroke-dasharray="3 3" opacity=".8"/>
  <polygon points="232,180 221,174 221,186" fill="#8ab4f8" opacity=".8"/>
  <text class="lbl" x="195" y="166" text-anchor="middle" font-size="8" fill="#8ab4f8">Q×Kᵀ</text>

  <!-- ═══ Attention heatmap 8×8 ═══ (x:236-396, y:80-240, cells 20×20) -->
  <!-- Causal-lower-triangle pattern, brightening toward diagonal -->
  <!-- Row 0 -->
  <rect x="236" y="80"  width="19" height="19" rx="1" fill="rgb(92,155,255)"/>
  <rect x="256" y="80"  width="19" height="19" rx="1" fill="rgb(28,44,90)"/>
  <rect x="276" y="80"  width="19" height="19" rx="1" fill="rgb(22,36,74)"/>
  <rect x="296" y="80"  width="19" height="19" rx="1" fill="rgb(18,30,62)"/>
  <rect x="316" y="80"  width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <rect x="336" y="80"  width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <rect x="356" y="80"  width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <rect x="376" y="80"  width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <!-- Row 1 -->
  <rect x="236" y="100" width="19" height="19" rx="1" fill="rgb(58,98,205)"/>
  <rect x="256" y="100" width="19" height="19" rx="1" fill="rgb(108,178,255)"/>
  <rect x="276" y="100" width="19" height="19" rx="1" fill="rgb(28,46,96)"/>
  <rect x="296" y="100" width="19" height="19" rx="1" fill="rgb(20,34,70)"/>
  <rect x="316" y="100" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <rect x="336" y="100" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <rect x="356" y="100" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <rect x="376" y="100" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <!-- Row 2 -->
  <rect x="236" y="120" width="19" height="19" rx="1" fill="rgb(40,68,148)"/>
  <rect x="256" y="120" width="19" height="19" rx="1" fill="rgb(62,105,215)"/>
  <rect x="276" y="120" width="19" height="19" rx="1" fill="rgb(120,192,255)"/>
  <rect x="296" y="120" width="19" height="19" rx="1" fill="rgb(32,54,112)"/>
  <rect x="316" y="120" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <rect x="336" y="120" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <rect x="356" y="120" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <rect x="376" y="120" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <!-- Row 3 -->
  <rect x="236" y="140" width="19" height="19" rx="1" fill="rgb(34,58,122)"/>
  <rect x="256" y="140" width="19" height="19" rx="1" fill="rgb(72,122,232)"/>
  <rect x="276" y="140" width="19" height="19" rx="1" fill="rgb(52,88,178)"/>
  <rect x="296" y="140" width="19" height="19" rx="1" fill="rgb(130,202,255)"/>
  <rect x="316" y="140" width="19" height="19" rx="1" fill="rgb(28,46,98)"/>
  <rect x="336" y="140" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <rect x="356" y="140" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <rect x="376" y="140" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <!-- Row 4 -->
  <rect x="236" y="160" width="19" height="19" rx="1" fill="rgb(26,44,94)"/>
  <rect x="256" y="160" width="19" height="19" rx="1" fill="rgb(52,88,178)"/>
  <rect x="276" y="160" width="19" height="19" rx="1" fill="rgb(80,136,248)"/>
  <rect x="296" y="160" width="19" height="19" rx="1" fill="rgb(58,98,198)"/>
  <rect x="316" y="160" width="19" height="19" rx="1" fill="rgb(142,214,255)"/>
  <rect x="336" y="160" width="19" height="19" rx="1" fill="rgb(24,40,84)"/>
  <rect x="356" y="160" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <rect x="376" y="160" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <!-- Row 5 -->
  <rect x="236" y="180" width="19" height="19" rx="1" fill="rgb(24,40,86)"/>
  <rect x="256" y="180" width="19" height="19" rx="1" fill="rgb(44,74,154)"/>
  <rect x="276" y="180" width="19" height="19" rx="1" fill="rgb(66,112,222)"/>
  <rect x="296" y="180" width="19" height="19" rx="1" fill="rgb(90,152,255)"/>
  <rect x="316" y="180" width="19" height="19" rx="1" fill="rgb(68,115,228)"/>
  <rect x="336" y="180" width="19" height="19" rx="1" fill="rgb(152,222,255)"/>
  <rect x="356" y="180" width="19" height="19" rx="1" fill="rgb(22,36,76)"/>
  <rect x="376" y="180" width="19" height="19" rx="1" fill="rgb(16,26,54)"/>
  <!-- Row 6 -->
  <rect x="236" y="200" width="19" height="19" rx="1" fill="rgb(22,36,80)"/>
  <rect x="256" y="200" width="19" height="19" rx="1" fill="rgb(38,64,134)"/>
  <rect x="276" y="200" width="19" height="19" rx="1" fill="rgb(52,88,178)"/>
  <rect x="296" y="200" width="19" height="19" rx="1" fill="rgb(74,126,240)"/>
  <rect x="316" y="200" width="19" height="19" rx="1" fill="rgb(98,165,255)"/>
  <rect x="336" y="200" width="19" height="19" rx="1" fill="rgb(78,132,244)"/>
  <rect x="356" y="200" width="19" height="19" rx="1" fill="rgb(162,228,255)"/>
  <rect x="376" y="200" width="19" height="19" rx="1" fill="rgb(20,34,72)"/>
  <!-- Row 7 -->
  <rect x="236" y="220" width="19" height="19" rx="1" fill="rgb(20,34,76)"/>
  <rect x="256" y="220" width="19" height="19" rx="1" fill="rgb(36,60,124)"/>
  <rect x="276" y="220" width="19" height="19" rx="1" fill="rgb(48,82,166)"/>
  <rect x="296" y="220" width="19" height="19" rx="1" fill="rgb(64,108,210)"/>
  <rect x="316" y="220" width="19" height="19" rx="1" fill="rgb(84,142,252)"/>
  <rect x="336" y="220" width="19" height="19" rx="1" fill="rgb(100,168,255)"/>
  <rect x="356" y="220" width="19" height="19" rx="1" fill="rgb(84,142,252)"/>
  <rect x="376" y="220" width="19" height="19" rx="1" fill="rgb(172,232,255)"/>

  <!-- Heatmap border -->
  <rect x="235" y="79" width="162" height="162" rx="3" fill="none" stroke="#4285f4" stroke-width="1.2"/>
  <text class="lbl" x="316" y="70" text-anchor="middle" font-size="8.5" fill="#8ab4f8">softmax(QK&#x1D40;/&#x221A;d)</text>
  <text class="lbl" x="316" y="256" text-anchor="middle" font-size="7.5" fill="#486490">causal N&#xD7;N · brightens on diagonal</text>

  <!-- Animated scan column over heatmap -->
  <g class="scan">
    <rect x="236" y="80" width="3" height="160" fill="url(#scanGrad)"/>
  </g>

  <!-- ×V arrow and output O -->
  <line x1="403" y1="170" x2="444" y2="170" stroke="#ff8a2a" stroke-width="1.3" stroke-dasharray="3 3" opacity=".8"/>
  <polygon points="448,170 438,164 438,176" fill="#ff8a2a" opacity=".8"/>
  <text class="lbl" x="424" y="157" text-anchor="middle" font-size="8" fill="#ffc890">&#xD7;V</text>
  <rect x="452" y="115" width="28" height="110" rx="4" fill="rgba(58,206,224,.18)" stroke="#3acee0" stroke-width="1.2"/>
  <text class="lbl" x="466" y="108" text-anchor="middle" font-size="10" fill="#78d9ec" font-weight="700">O</text>

  <!-- Beads: Q/K → heatmap -->
  <circle class="bead bq" cx="0" cy="0" r="2.2"/>
  <circle class="bead bk" cx="0" cy="0" r="2.2"/>

  <!-- Divider: standard ↕ flash -->
  <line x1="504" y1="52" x2="504" y2="398" stroke="#1e2d47" stroke-width="1" stroke-dasharray="4 6"/>
  <text class="lbl" x="504" y="408" text-anchor="middle" font-size="7.5" fill="#3a5070">standard</text>
  <text class="lbl" x="504" y="420" text-anchor="middle" font-size="7.5" fill="#3a5070">flash ▶</text>

  <!-- ═══ FlashAttention: SRAM tile panel ═══ -->
  <rect x="520" y="64" width="248" height="188" rx="10" fill="rgba(52,168,83,.05)" stroke="#48ba6a" stroke-width="1.6"/>
  <text class="lbl" x="544" y="82" text-anchor="left" font-size="9" fill="#a8e6c0" font-weight="700">SRAM — only tiles, no N&#xD7;N</text>

  <!-- Q block -->
  <g class="tp">
    <rect x="534" y="94" width="106" height="46" rx="6" fill="rgba(176,94,250,.28)" stroke="#d6a8ff" stroke-width="1.3"/>
    <text class="lbl" x="587" y="120" text-anchor="middle" font-size="9" fill="#fff">Q&#x2080; block</text>
  </g>
  <!-- K block -->
  <g class="tp tp2">
    <rect x="650" y="94" width="104" height="46" rx="6" fill="rgba(72,186,106,.28)" stroke="#a8e6c0" stroke-width="1.3"/>
    <text class="lbl" x="702" y="120" text-anchor="middle" font-size="9" fill="#fff">K&#x2080; block</text>
  </g>
  <!-- V block -->
  <g class="tp tp3">
    <rect x="534" y="150" width="106" height="46" rx="6" fill="rgba(255,138,42,.28)" stroke="#ffc890" stroke-width="1.3"/>
    <text class="lbl" x="587" y="176" text-anchor="middle" font-size="9" fill="#fff">V&#x2080; block</text>
  </g>
  <!-- Score tile (working area) -->
  <g class="tp tp4">
    <rect x="650" y="150" width="104" height="46" rx="6" fill="rgba(88,148,250,.28)" stroke="#a8caff" stroke-width="1.3"/>
    <text class="lbl" x="702" y="171" text-anchor="middle" font-size="9" fill="#fff">score tile</text>
    <text class="lbl" x="702" y="186" text-anchor="middle" font-size="7.5" fill="#a8caff">B&#xD7;B · born here, dies here</text>
  </g>

  <!-- HBM footer: ghost N×N markers -->
  <rect x="520" y="266" width="248" height="56" rx="8" fill="rgba(234,67,53,.05)" stroke="#f28b82" stroke-width="1.2"/>
  <text class="lbl" x="544" y="284" text-anchor="left" font-size="8.5" fill="#f0b3ac">HBM</text>
  <!-- Ghost S, P boxes (never written) -->
  <rect x="596" y="272" width="32" height="32" rx="2" fill="none" stroke="#f28b82" stroke-width="1" stroke-dasharray="3 3" opacity=".7"/>
  <text class="lbl" x="612" y="291" text-anchor="middle" font-size="7.5" fill="#f28b82">S ✗</text>
  <rect x="638" y="272" width="32" height="32" rx="2" fill="none" stroke="#f28b82" stroke-width="1" stroke-dasharray="3 3" opacity=".7"/>
  <text class="lbl" x="654" y="291" text-anchor="middle" font-size="7.5" fill="#f28b82">P ✗</text>
  <text class="lbl" x="700" y="282" text-anchor="left" font-size="7.5" fill="#f0b3ac">N&#xD7;N intermediates</text>
  <text class="lbl" x="700" y="296" text-anchor="left" font-size="7.5" fill="#f0b3ac">never materialised</text>

  <!-- Arrow HBM → SRAM -->
  <line x1="650" y1="264" x2="650" y2="256" stroke="#a8e6c0" stroke-width="1.2"/>
  <polygon points="650,252 644,261 656,261" fill="#a8e6c0"/>
  <text class="lbl" x="650" y="244" text-anchor="middle" font-size="7.5" fill="#9fd4b3">feeds tiles</text>

  <!-- ═══ Complexity pills ═══ -->
  <rect x="520" y="334" width="112" height="36" rx="7" fill="rgba(234,67,53,.10)" stroke="rgba(234,67,53,.4)" stroke-width="1"/>
  <text class="lbl" x="576" y="350" text-anchor="middle" font-size="8" fill="#f28b82" font-weight="700">standard O(N&#xB2;)</text>
  <text class="lbl" x="576" y="362" text-anchor="middle" font-size="7.5" fill="#f0b3ac">writes S, P to HBM</text>

  <rect x="648" y="334" width="112" height="36" rx="7" fill="rgba(52,168,83,.10)" stroke="rgba(52,168,83,.4)" stroke-width="1"/>
  <text class="lbl" x="704" y="350" text-anchor="middle" font-size="8" fill="#81c995" font-weight="700">flash O(N) mem</text>
  <text class="lbl" x="704" y="362" text-anchor="middle" font-size="7.5" fill="#9fd4b3">tiled · IO-optimal</text>

  <!-- ═══ Title + sub ═══ -->
  <text class="title" x="44" y="424" font-size="21" fill="#dce8f8">Attention &#x2192; FlashAttention</text>
  <text class="lbl" x="290" y="424" font-size="9.5" fill="#506888" letter-spacing=".08em">self · multi-head · linear · FA-1/2/3</text>

  <!-- Top label -->
  <text class="lbl" x="44" y="54" font-size="9.5" fill="#3a5278" letter-spacing=".12em">// ATTENTION_MECHANISM.v3</text>
</svg>
