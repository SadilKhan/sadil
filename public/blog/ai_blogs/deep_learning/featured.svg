<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="dl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1016"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <radialGradient id="dl-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#43c9b8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#43c9b8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#dl-bg)"/>
  <ellipse cx="400" cy="200" rx="380" ry="200" fill="url(#dl-glow)" opacity="0.5"/>

  <!-- Grid -->
  <g stroke="#1a2030" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="267" y1="0" x2="267" y2="450"/>
    <line x1="534" y1="0" x2="534" y2="450"/>
  </g>

  <!-- ═══ Panel 1: Neural Network ═══ -->
  <rect x="20" y="50" width="230" height="350" rx="10" fill="#0d1320" stroke="#1e2a3a" stroke-width="1"/>
  <text x="135" y="78" text-anchor="middle" fill="#43c9b8" font-family="monospace" font-size="11" font-weight="600" letter-spacing="1">NEURAL NET</text>

  <g transform="translate(40, 105)">
    <!-- Layer labels -->
    <text x="20"  y="0" text-anchor="middle" fill="#5a6779" font-family="monospace" font-size="7.5">Input</text>
    <text x="95"  y="0" text-anchor="middle" fill="#5a6779" font-family="monospace" font-size="7.5">Hidden ×N</text>
    <text x="170" y="0" text-anchor="middle" fill="#5a6779" font-family="monospace" font-size="7.5">Output</text>

    <!-- Input layer nodes -->
    <g fill="#0d2a3a" stroke="#24c1e0" stroke-width="1.2">
      <circle cx="20" cy="30"  r="12"/>
      <circle cx="20" cy="68"  r="12"/>
      <circle cx="20" cy="106" r="12"/>
      <circle cx="20" cy="144" r="12"/>
      <circle cx="20" cy="182" r="12"/>
    </g>
    <g fill="#43c9b8" font-family="monospace" font-size="7" text-anchor="middle">
      <text x="20" cy="30"  y="33">x₁</text>
      <text x="20" y="71">x₂</text>
      <text x="20" y="109">x₃</text>
      <text x="20" y="147">x₄</text>
      <text x="20" y="185">x₅</text>
    </g>

    <!-- Hidden layer nodes -->
    <g fill="#0d1a2a" stroke="#4285f4" stroke-width="1.2">
      <circle cx="95" cy="49"  r="12"/>
      <circle cx="95" cy="87"  r="12"/>
      <circle cx="95" cy="125" r="12"/>
      <circle cx="95" cy="163" r="12"/>
    </g>
    <g fill="#8ab4f8" font-family="monospace" font-size="7" text-anchor="middle">
      <text x="95" y="52">h₁</text>
      <text x="95" y="90">h₂</text>
      <text x="95" y="128">h₃</text>
      <text x="95" y="166">h₄</text>
    </g>

    <!-- Output layer -->
    <g fill="#0d2a1a" stroke="#34a853" stroke-width="1.5">
      <circle cx="170" cy="87"  r="13"/>
      <circle cx="170" cy="125" r="13"/>
    </g>
    <g fill="#81c995" font-family="monospace" font-size="7" text-anchor="middle">
      <text x="170" y="90">y₁</text>
      <text x="170" y="128">y₂</text>
    </g>

    <!-- Connections (input → hidden) -->
    <g stroke="#24c1e0" stroke-width="0.4" opacity="0.3">
      <line x1="32" y1="30"  x2="83" y2="49"/>
      <line x1="32" y1="30"  x2="83" y2="87"/>
      <line x1="32" y1="68"  x2="83" y2="49"/>
      <line x1="32" y1="68"  x2="83" y2="87"/>
      <line x1="32" y1="106" x2="83" y2="87"/>
      <line x1="32" y1="106" x2="83" y2="125"/>
      <line x1="32" y1="144" x2="83" y2="125"/>
      <line x1="32" y1="144" x2="83" y2="163"/>
      <line x1="32" y1="182" x2="83" y2="125"/>
      <line x1="32" y1="182" x2="83" y2="163"/>
    </g>
    <!-- Connections (hidden → output) — highlighted -->
    <g stroke="#4285f4" stroke-width="0.8" opacity="0.5">
      <line x1="107" y1="49"  x2="157" y2="87"/>
      <line x1="107" y1="87"  x2="157" y2="87"/>
      <line x1="107" y1="87"  x2="157" y2="125"/>
      <line x1="107" y1="125" x2="157" y2="87"/>
      <line x1="107" y1="125" x2="157" y2="125"/>
      <line x1="107" y1="163" x2="157" y2="125"/>
    </g>

    <!-- Activation label -->
    <text x="95" y="210" text-anchor="middle" fill="#5a6779" font-family="monospace" font-size="7.5">σ(Wx + b) at each node</text>
    <!-- Backprop arrow -->
    <path d="M 158 138 Q 95 220 32 194" fill="none" stroke="#ef6f6c" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>
    <text x="95" y="235" text-anchor="middle" fill="#ef6f6c" font-family="monospace" font-size="7.5">∂L/∂w — backprop</text>
  </g>

  <!-- ═══ Panel 2: Loss curve + gradient ═══ -->
  <rect x="285" y="50" width="230" height="350" rx="10" fill="#0d1320" stroke="#1e2a3a" stroke-width="1"/>
  <text x="400" y="78" text-anchor="middle" fill="#f2b65a" font-family="monospace" font-size="11" font-weight="600" letter-spacing="1">TRAINING</text>

  <g transform="translate(300, 100)">
    <!-- Training loss curve -->
    <text x="100" y="15" text-anchor="middle" fill="#f2b65a" font-family="monospace" font-size="9" font-weight="600">Loss Curve</text>
    <rect x="0" y="22" width="200" height="110" rx="6" fill="#0a0e14" stroke="#222e40" stroke-width="0.8"/>
    <!-- Axes -->
    <line x1="16" y1="28" x2="16" y2="120" stroke="#374151" stroke-width="1"/>
    <line x1="16" y1="120" x2="192" y2="120" stroke="#374151" stroke-width="1"/>
    <text x="10" y="32" fill="#5a6779" font-family="monospace" font-size="7">L</text>
    <text x="190" y="128" fill="#5a6779" font-family="monospace" font-size="7">step</text>
    <!-- Train loss (falling) -->
    <path d="M 20,38 C 40,42 55,55 75,72 C 95,85 115,95 140,104 C 160,110 180,113 190,114" fill="none" stroke="#ef6f6c" stroke-width="1.8" opacity="0.9"/>
    <!-- Val loss (falling then slightly rising) -->
    <path d="M 20,45 C 40,52 60,68 80,82 C 100,92 120,100 145,106 C 165,110 182,109 190,112" fill="none" stroke="#43c9b8" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.8"/>
    <!-- Labels -->
    <text x="170" y="108" fill="#ef6f6c" font-family="monospace" font-size="7">train</text>
    <text x="170" y="99" fill="#43c9b8" font-family="monospace" font-size="7">val</text>

    <!-- Gradient flow -->
    <text x="100" y="155" text-anchor="middle" fill="#f2b65a" font-family="monospace" font-size="9" font-weight="600">Chain Rule</text>
    <rect x="0" y="163" width="200" height="50" rx="6" fill="#0a0e14" stroke="#222e40" stroke-width="0.8"/>
    <text x="100" y="181" text-anchor="middle" fill="#f2b65a" font-family="monospace" font-size="8.5">∂L/∂w = ∂L/∂y · ∂y/∂h · ∂h/∂w</text>
    <text x="100" y="200" text-anchor="middle" fill="#8c6800" font-family="monospace" font-size="8">each layer's gradient multiplied</text>

    <!-- Optimizer comparison mini -->
    <text x="100" y="235" text-anchor="middle" fill="#f2b65a" font-family="monospace" font-size="9" font-weight="600">Convergence Speed</text>
    <rect x="0" y="243" width="200" height="75" rx="6" fill="#0a0e14" stroke="#222e40" stroke-width="0.8"/>
    <!-- Mini bar chart -->
    <rect x="18"  y="290" width="24" height="18" rx="2" fill="#5fb8f0" opacity="0.7"/>
    <rect x="48"  y="278" width="24" height="30" rx="2" fill="#a98bf0" opacity="0.7"/>
    <rect x="78"  y="265" width="24" height="43" rx="2" fill="#43c9b8" opacity="0.8"/>
    <rect x="108" y="258" width="24" height="50" rx="2" fill="#f2b65a" opacity="0.9"/>
    <rect x="138" y="252" width="24" height="56" rx="2" fill="#ef6f6c" opacity="0.7"/>
    <line x1="10" y1="308" x2="190" y2="308" stroke="#374151" stroke-width="0.8"/>
    <text x="30"  y="316" text-anchor="middle" fill="#5a6779" font-family="monospace" font-size="6.5">GD</text>
    <text x="60"  y="316" text-anchor="middle" fill="#5a6779" font-family="monospace" font-size="6.5">SGD</text>
    <text x="90"  y="316" text-anchor="middle" fill="#5a6779" font-family="monospace" font-size="6.5">Mom</text>
    <text x="120" y="316" text-anchor="middle" fill="#5a6779" font-family="monospace" font-size="6.5">Adam</text>
    <text x="150" y="316" text-anchor="middle" fill="#5a6779" font-family="monospace" font-size="6.5">AdamW</text>
    <text x="100" y="248" text-anchor="middle" fill="#374151" font-family="monospace" font-size="7">steps to converge (fewer = better)</text>
  </g>

  <!-- ═══ Panel 3: Regularization & tricks ═══ -->
  <rect x="550" y="50" width="230" height="350" rx="10" fill="#0d1320" stroke="#1e2a3a" stroke-width="1"/>
  <text x="665" y="78" text-anchor="middle" fill="#a98bf0" font-family="monospace" font-size="11" font-weight="600" letter-spacing="1">TECHNIQUES</text>

  <g transform="translate(565, 100)">
    <!-- LR schedule -->
    <text x="100" y="15" text-anchor="middle" fill="#a98bf0" font-family="monospace" font-size="9" font-weight="600">LR Schedules</text>
    <rect x="0" y="22" width="200" height="65" rx="6" fill="#0a0e14" stroke="#1e2a3a" stroke-width="0.8"/>
    <!-- LR curve -->
    <line x1="12" y1="28" x2="12" y2="78" stroke="#374151" stroke-width="1"/>
    <line x1="12" y1="78" x2="192" y2="78" stroke="#374151" stroke-width="1"/>
    <!-- Cosine annealing -->
    <path d="M 14,32 C 50,32 70,70 95,72 C 110,73 120,60 140,50 C 155,43 170,68 190,70" fill="none" stroke="#a98bf0" stroke-width="1.5" opacity="0.8"/>
    <!-- Warmup + decay -->
    <path d="M 14,72 L 40,35 L 190,70" fill="none" stroke="#f2b65a" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.7"/>
    <text x="100" y="87" text-anchor="middle" fill="#374151" font-family="monospace" font-size="7">cosine · linear · warmup</text>

    <!-- Regularization -->
    <text x="100" y="108" text-anchor="middle" fill="#a98bf0" font-family="monospace" font-size="9" font-weight="600">Regularization</text>
    <rect x="0" y="115" width="94" height="40" rx="5" fill="#12091a" stroke="#3b1f5e" stroke-width="0.8"/>
    <text x="47" y="131" text-anchor="middle" fill="#c58af9" font-family="monospace" font-size="8" font-weight="600">L2 / Weight Decay</text>
    <text x="47" y="146" text-anchor="middle" fill="#6d28d9" font-family="monospace" font-size="7">‖θ‖² penalty</text>
    <rect x="106" y="115" width="94" height="40" rx="5" fill="#12091a" stroke="#3b1f5e" stroke-width="0.8"/>
    <text x="153" y="131" text-anchor="middle" fill="#c58af9" font-family="monospace" font-size="8" font-weight="600">Dropout</text>
    <text x="153" y="146" text-anchor="middle" fill="#6d28d9" font-family="monospace" font-size="7">zero with prob p</text>

    <!-- Gradient clipping -->
    <rect x="0" y="165" width="200" height="34" rx="5" fill="#0a1520" stroke="#1d3a5f" stroke-width="0.8"/>
    <text x="100" y="181" text-anchor="middle" fill="#5fb8f0" font-family="monospace" font-size="8" font-weight="600">Gradient Clipping</text>
    <text x="100" y="193" text-anchor="middle" fill="#1e40af" font-family="monospace" font-size="7">g ← g · min(1, c/‖g‖)</text>

    <!-- Batch norm -->
    <rect x="0" y="210" width="200" height="34" rx="5" fill="#051a0a" stroke="#065f46" stroke-width="0.8"/>
    <text x="100" y="226" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="8" font-weight="600">Batch Normalization</text>
    <text x="100" y="238" text-anchor="middle" fill="#065f46" font-family="monospace" font-size="7">x̂ = (x-μ)/σ · γ + β</text>

    <!-- Cheat sheet -->
    <text x="100" y="268" text-anchor="middle" fill="#a98bf0" font-family="monospace" font-size="9" font-weight="600">When to Use What</text>
    <rect x="0" y="276" width="200" height="60" rx="5" fill="#0a0e14" stroke="#1e2a3a" stroke-width="0.8"/>
    <text x="10" y="292" fill="#43c9b8" font-family="monospace" font-size="7.5">AdamW  → transformers, most DL</text>
    <text x="10" y="307" fill="#5fb8f0" font-family="monospace" font-size="7.5">SGD+m  → vision CNNs, fine-tune</text>
    <text x="10" y="322" fill="#f2b65a" font-family="monospace" font-size="7.5">LAMB   → large batch distributed</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="410" width="800" height="40" fill="#06080e" opacity="0.9"/>
  <text x="400" y="432" text-anchor="middle" fill="#374151" font-family="monospace" font-size="11" letter-spacing="2">AI NOTEBOOK · DEEP LEARNING</text>
  <text x="30"  y="432" text-anchor="start"  fill="#1a2030" font-family="monospace" font-size="10">1 post</text>
  <text x="770" y="432" text-anchor="end"    fill="#1a2030" font-family="monospace" font-size="10">optimizers · training · regularization</text>
</svg>
