<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LLM parallelism — GPU mesh with tensor and pipeline parallel flow">
  <style>
    .bg { fill: #0a0c10; }
    .gpu { fill: #1e232d; stroke: rgba(138, 180, 248, 0.40); stroke-width: 1.4; rx: 6; }
    .gpu-on { fill: rgba(138, 180, 248, 0.16); stroke: #8ab4f8; filter: drop-shadow(0 0 6px rgba(138, 180, 248, 0.45)); }
    .gpu-label { font: 700 9.5px 'JetBrains Mono', monospace; fill: rgba(232, 234, 237, 0.95); text-anchor: middle; letter-spacing: 0.08em; }
    .gpu-tag   { font: 600 8px 'JetBrains Mono', monospace; fill: rgba(138, 180, 248, 0.65); text-anchor: middle; letter-spacing: 0.06em; text-transform: uppercase; }
    .conn-h { stroke: rgba(138, 180, 248, 0.25); stroke-width: 1; }
    .conn-v { stroke: rgba(52, 168, 83, 0.30); stroke-width: 1; }
    .pulse-h { fill: #8ab4f8; filter: drop-shadow(0 0 6px rgba(138, 180, 248, 0.85)); }
    .pulse-v { fill: #34a853; filter: drop-shadow(0 0 6px rgba(52, 168, 83, 0.85)); }
    .axis-label { font: 700 9px 'JetBrains Mono', monospace; letter-spacing: 0.12em; text-transform: uppercase; }
    .title { font: 800 13px 'Plus Jakarta Sans', sans-serif; fill: #e8eaed; letter-spacing: 0.04em; }
    .sub  { font: 600 10px 'JetBrains Mono', monospace; fill: rgba(138, 180, 248, 0.60); letter-spacing: 0.10em; text-transform: uppercase; }

    @keyframes par-h {
      0%   { offset-distance: 0%;   opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    @keyframes gpu-blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.7; }
    }
    .row-1 { animation: par-h 3.6s linear infinite; offset-path: path('M 110 150 H 490'); offset-rotate: 0deg; }
    .row-2 { animation: par-h 3.6s linear infinite; offset-path: path('M 110 250 H 490'); offset-rotate: 0deg; animation-delay: 0.8s; }
    .col-1 { animation: par-h 4.2s linear infinite; offset-path: path('M 140 130 V 280'); offset-rotate: 0deg; animation-delay: 0.4s; }
    .col-2 { animation: par-h 4.2s linear infinite; offset-path: path('M 235 130 V 280'); offset-rotate: 0deg; animation-delay: 1.2s; }
    .col-3 { animation: par-h 4.2s linear infinite; offset-path: path('M 330 130 V 280'); offset-rotate: 0deg; animation-delay: 2.0s; }
    .col-4 { animation: par-h 4.2s linear infinite; offset-path: path('M 425 130 V 280'); offset-rotate: 0deg; animation-delay: 2.8s; }
    .blink-1 { animation: gpu-blink 2.4s ease-in-out infinite; }
    .blink-2 { animation: gpu-blink 2.4s ease-in-out infinite; animation-delay: 0.6s; }
    .blink-3 { animation: gpu-blink 2.4s ease-in-out infinite; animation-delay: 1.2s; }
    .blink-4 { animation: gpu-blink 2.4s ease-in-out infinite; animation-delay: 1.8s; }
    @media (prefers-reduced-motion: reduce) {
      .row-1, .row-2, .col-1, .col-2, .col-3, .col-4,
      .blink-1, .blink-2, .blink-3, .blink-4 { animation: none; }
    }
  </style>

  <rect class="bg" width="600" height="400"/>

  <!-- header -->
  <text class="sub"   x="40" y="38">distributed training · 2-D mesh</text>
  <text class="title" x="40" y="58">Tensor parallel (rows) × Pipeline parallel (cols)</text>

  <!-- horizontal connection lines (tensor parallel — within a layer) -->
  <line class="conn-h" x1="110" y1="150" x2="490" y2="150"/>
  <line class="conn-h" x1="110" y1="250" x2="490" y2="250"/>

  <!-- vertical connection lines (pipeline parallel — between layers) -->
  <line class="conn-v" x1="140" y1="130" x2="140" y2="280"/>
  <line class="conn-v" x1="235" y1="130" x2="235" y2="280"/>
  <line class="conn-v" x1="330" y1="130" x2="330" y2="280"/>
  <line class="conn-v" x1="425" y1="130" x2="425" y2="280"/>

  <!-- 2x4 GPU grid (row 1: stage 0, row 2: stage 1) -->
  <g class="blink-1">
    <rect class="gpu gpu-on" x="108" y="118" width="64" height="64" rx="6"/>
    <text class="gpu-label" x="140" y="142">GPU 0</text>
    <text class="gpu-tag"   x="140" y="160">TP·0 PP·0</text>
  </g>
  <g class="blink-2">
    <rect class="gpu" x="203" y="118" width="64" height="64" rx="6"/>
    <text class="gpu-label" x="235" y="142">GPU 1</text>
    <text class="gpu-tag"   x="235" y="160">TP·1 PP·0</text>
  </g>
  <g class="blink-3">
    <rect class="gpu" x="298" y="118" width="64" height="64" rx="6"/>
    <text class="gpu-label" x="330" y="142">GPU 2</text>
    <text class="gpu-tag"   x="330" y="160">TP·2 PP·0</text>
  </g>
  <g class="blink-4">
    <rect class="gpu gpu-on" x="393" y="118" width="64" height="64" rx="6"/>
    <text class="gpu-label" x="425" y="142">GPU 3</text>
    <text class="gpu-tag"   x="425" y="160">TP·3 PP·0</text>
  </g>

  <g class="blink-2">
    <rect class="gpu" x="108" y="218" width="64" height="64" rx="6"/>
    <text class="gpu-label" x="140" y="242">GPU 4</text>
    <text class="gpu-tag"   x="140" y="260">TP·0 PP·1</text>
  </g>
  <g class="blink-4">
    <rect class="gpu gpu-on" x="203" y="218" width="64" height="64" rx="6"/>
    <text class="gpu-label" x="235" y="242">GPU 5</text>
    <text class="gpu-tag"   x="235" y="260">TP·1 PP·1</text>
  </g>
  <g class="blink-1">
    <rect class="gpu gpu-on" x="298" y="218" width="64" height="64" rx="6"/>
    <text class="gpu-label" x="330" y="242">GPU 6</text>
    <text class="gpu-tag"   x="330" y="260">TP·2 PP·1</text>
  </g>
  <g class="blink-3">
    <rect class="gpu" x="393" y="218" width="64" height="64" rx="6"/>
    <text class="gpu-label" x="425" y="242">GPU 7</text>
    <text class="gpu-tag"   x="425" y="260">TP·3 PP·1</text>
  </g>

  <!-- horizontal pulses (all-reduce along row) -->
  <circle class="pulse-h row-1" r="4"/>
  <circle class="pulse-h row-2" r="4"/>

  <!-- vertical pulses (activation crossing pipeline stages) -->
  <circle class="pulse-v col-1" r="4"/>
  <circle class="pulse-v col-2" r="4"/>
  <circle class="pulse-v col-3" r="4"/>
  <circle class="pulse-v col-4" r="4"/>

  <!-- axis labels -->
  <text class="axis-label" x="500" y="155" fill="#8ab4f8">→ tensor</text>
  <text class="axis-label" x="500" y="255" fill="#8ab4f8">→ tensor</text>
  <text class="axis-label" x="140" y="305" fill="#34a853" text-anchor="middle">↓ pipeline</text>
  <text class="axis-label" x="425" y="305" fill="#34a853" text-anchor="middle">↓ pipeline</text>
</svg>
